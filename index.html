      margin: 0;

      height: 100%;

    }

      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      min-height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }
    canvas {
      /* 16:9 を保ちつつビューポートに最大表示（内部解像度は 960×540 のまま） */
      image-rendering: pixelated;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      background-color: #2e0f0f; /* デフォルト背景（赤系） */

    function drawPixelSprite(sprite, palette, pixelSize, cx, cy) {
      const rows = sprite.length;
      const cols = sprite[0].length;
      const w = cols * pixelSize;
      const h = rows * pixelSize;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.translate(-w / 2, -h / 2);
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const ch = sprite[y][x];
          if (ch === '.' || ch === ' ') continue;
          const col = palette[ch];
          if (!col) continue;
          ctx.fillStyle = col;
          ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
        }
      }
      ctx.restore();
    }

    function drawMiniRuby(cx, cy, s) {
      ctx.save();
      ctx.translate(cx, cy);
      const p = [
        [0, -s], [s * 0.45, -s * 0.35], [s, 0], [0, s * 0.85], [-s, 0], [-s * 0.45, -s * 0.35]
      ];
      ctx.fillStyle = '#b01830';
      ctx.beginPath();
      ctx.moveTo(p[0][0], p[0][1]);
      for (let i = 1; i < p.length; i++) ctx.lineTo(p[i][0], p[i][1]);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#1a0a0a';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,200,220,0.5)';
      ctx.fillRect(-s * 0.15, -s * 0.35, s * 0.2, s * 0.25);
      ctx.restore();
    }

    function drawBackdropVignette(strength) {

    function resolveAssetURL(src) {
      try {
        return new URL(src, window.location.href).href;
      } catch (e) {
        return src;

    }

    function drawableSize(d) {
      if (!d) return { w: 0, h: 0 };
      const w = d.naturalWidth || d.width || 0;
      const h = d.naturalHeight || d.height || 0;
      return { w, h };
    }

    /**
     * 画像周縁から「近黒」で連結しているピクセルだけ α=0（ベタ黒背景用。Canvas を返す）
     */
    function removeEdgeConnectedNearBlack(img, maxRgb) {
      const max = maxRgb != null ? maxRgb : 32;
      const { w, h } = drawableSize(img);
      if (!w || !h) return img;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const c2d = canvas.getContext('2d');
      c2d.drawImage(img, 0, 0);
      const imageData = c2d.getImageData(0, 0, w, h);
      const d = imageData.data;
      const isKey = (i) =>
        d[i] <= max && d[i + 1] <= max && d[i + 2] <= max;
      const seen = new Uint8Array(w * h);
      const q = [];
      const tryPush = (x, y) => {
        if (x < 0 || x >= w || y < 0 || y >= h) return;
        const p = y * w + x;
        if (seen[p]) return;
        const i = p * 4;
        if (!isKey(i)) return;
        seen[p] = 1;
        q.push(p);
      };
      for (let x = 0; x < w; x++) {
        tryPush(x, 0);
        tryPush(x, h - 1);
      }
      for (let y = 0; y < h; y++) {
        tryPush(0, y);
        tryPush(w - 1, y);
      }
      let qi = 0;
      while (qi < q.length) {
        const p = q[qi++];
        const i = p * 4;
        d[i + 3] = 0;
        const x = p % w;
        const y = (p / w) | 0;
        const nbr = [
          [x + 1, y],
          [x - 1, y],
          [x, y + 1],
          [x, y - 1]
        ];
        for (let k = 0; k < 4; k++) {
          const nx = nbr[k][0];
          const ny = nbr[k][1];
          if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
            const p2 = ny * w + nx;
            if (!seen[p2] && isKey(p2 * 4)) {
              seen[p2] = 1;
              q.push(p2);
            }
          }
        }
      }
      c2d.putImageData(imageData, 0, 0);
      return canvas;
    }

    /**
     * ベタ黒〜近黒の背景だけ透過（周縁から BFS）。4 近傍に「十分明るい」色があれば黒も保護（輪郭・目など）
     */
    function removeBorderConnectedDarkMatte(img, darkMax, colorMin) {
      const dMax = darkMax != null ? darkMax : 40;
      const cMin = colorMin != null ? colorMin : 45;
      const { w, h } = drawableSize(img);
      if (!w || !h) return img;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const c2d = canvas.getContext('2d');
      c2d.drawImage(img, 0, 0);
      const imageData = c2d.getImageData(0, 0, w, h);
      const d = imageData.data;
      const maxCh = (i) =>
        Math.max(d[i], d[i + 1], d[i + 2]);
      const isDark = (i) => maxCh(i) <= dMax;
      const isBright = (i) => maxCh(i) > cMin;
      const isProtected = (x, y) => {
        const i = (y * w + x) * 4;
        if (!isDark(i)) return false;
        if (x + 1 < w && isBright((y * w + x + 1) * 4)) return true;
        if (x > 0 && isBright((y * w + x - 1) * 4)) return true;
        if (y + 1 < h && isBright(((y + 1) * w + x) * 4)) return true;
        if (y > 0 && isBright(((y - 1) * w + x) * 4)) return true;
        return false;
      };
      const seen = new Uint8Array(w * h);
      const q = [];
      const tryPush = (x, y) => {
        if (x < 0 || x >= w || y < 0 || y >= h) return;
        const p = y * w + x;
        if (seen[p]) return;
        const i = p * 4;
        if (!isDark(i) || isProtected(x, y)) return;
        seen[p] = 1;
        q.push(p);
      };
      for (let x = 0; x < w; x++) {
        tryPush(x, 0);
        tryPush(x, h - 1);
      }
      for (let y = 0; y < h; y++) {
        tryPush(0, y);
        tryPush(w - 1, y);
      }
      let qi = 0;
      while (qi < q.length) {
        const p = q[qi++];
        const i = p * 4;
        d[i + 3] = 0;
        const x = p % w;
        const y = (p / w) | 0;
        tryPush(x + 1, y);
        tryPush(x - 1, y);
        tryPush(x, y + 1);
        tryPush(x, y - 1);
      }
      c2d.putImageData(imageData, 0, 0);
      return canvas;
    }

    /** file:// では crossOrigin 付きが失敗することがあるため付けない（同一オリジンの PNG のみ） */
    function loadImageSrc(src) {
      return new Promise((resolve) => {
        if (!src) {
          resolve(null);
          return;
        }
        const url = resolveAssetURL(src);
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => {
          console.warn('[RUBYFIGHT] 画像を読み込めません:', url);
          resolve(null);
        };
        img.src = url;
      });
    }

    function clampSheetSource(img, sx, sy, sw, sh) {
      const iw = img.naturalWidth;
      const ih = img.naturalHeight;
      let x = sx;
      let y = sy;
      let w = sw;
      let h = sh;
      if (x < 0) {
        w += x;
        x = 0;
      }
      if (y < 0) {
        h += y;
        y = 0;
      }
      if (x + w > iw) w = iw - x;
      if (y + h > ih) h = ih - y;
      return { sx: x, sy: y, sw: Math.max(0, w), sh: Math.max(0, h) };
    }

    function getUniformSpriteFrameRect(imgW, imgH, cols, rows, frameIndex) {
      const col = frameIndex % cols;
      const row = Math.floor(frameIndex / cols);
      const baseW = Math.floor(imgW / cols);
      const baseH = Math.floor(imgH / rows);
      const sx = col * baseW;
      const sy = row * baseH;
      const sw = col === cols - 1 ? imgW - sx : baseW;
      const sh = row === rows - 1 ? imgH - sy : baseH;
      return { sx, sy, sw, sh };
    }

    function drawSpriteFrameInRect(img, sx, sy, sw, sh, rect) {
      if (!img || sw <= 0 || sh <= 0) return;
      const { x, y, w, h } = rect;
      const fit = rect.fit || 'contain';
      const scale =
        fit === 'cover' ? Math.max(w / sw, h / sh) : Math.min(w / sw, h / sh);
      const dw = sw * scale;
      const dh = sh * scale;
      const dx = x + (w - dw) / 2;
      const dy = y + (h - dh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
    }

    function drawTitleCharSpriteSheet(img, S, rect) {
      if (!S || !S.url || !img) return;
      const { w, h } = drawableSize(img);
      if (!w || !h) return;
      const cols = S.cols || 4;
      const rows = S.rows || 4;
      const total = cols * rows;
      const fps = S.fps || 6;
      const start = S.frameStart != null ? S.frameStart : 0;
      const count = S.frameCount != null ? S.frameCount : total;
      const tick = Math.floor(Date.now() / (1000 / fps));
      const f = Math.min(start + (tick % Math.max(1, count)), total - 1);
      const { sx, sy, sw, sh } = getUniformSpriteFrameRect(w, h, cols, rows, f);
      drawSpriteFrameInRect(img, sx, sy, sw, sh, rect);
    }

    function drawTitleCharRedSpriteSheet(rect) {
      drawTitleCharSpriteSheet(
        titleCharRedSheetImg,
        CONFIG.TITLE_CHAR_RED_SHEET,
        rect
      );
    }

    function drawTitleCharBlueSpriteSheet(rect) {
      drawTitleCharSpriteSheet(
        titleCharBlueSheetImg,
        CONFIG.TITLE_CHAR_BLUE_SHEET,
        rect
      );
    }

    function drawImageInRect(img, rect) {
      if (!img) return;
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      if (!iw || !ih) return;
      const { x, y, w, h } = rect;
      const fit = rect.fit || 'contain';
      let scale;
      if (fit === 'cover') {
        scale = Math.max(w / iw, h / ih);
      } else {
        scale = Math.min(w / iw, h / ih);
      }
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = x + (w - dw) / 2;
      const dy = y + (h - dh) / 2;
      ctx.drawImage(img, 0, 0, iw, ih, dx, dy, dw, dh);
    }

    function getScaledGridRect() {
      const S = CONFIG.ASSET_SHEET;
      const g = S.gridRect;
      const img = assetSheetImg;
      if (!img || !img.naturalWidth) return g;
      const fx = img.naturalWidth / S.sheetW;
      const fy = img.naturalHeight / S.sheetH;
      return {
        x: Math.round(g.x * fx),
        y: Math.round(g.y * fy),
        w: Math.round(g.w * fx),
        h: Math.round(g.h * fy)
      };
    }

    function getSheetCellRect(col, row) {
      const S = CONFIG.ASSET_SHEET;
      const g = getScaledGridRect();
      const cols = S.cols;
      const rows = S.rows;
      const cw = Math.floor(g.w / cols);
      const ch = Math.floor(g.h / rows);
      let sx = g.x + col * cw;
      let sy = g.y + row * ch;
      let sw = col === cols - 1 ? g.x + g.w - sx : cw;
      let sh = row === rows - 1 ? g.y + g.h - sy : ch;
      const ins = S.cellInset || 0;
      if (ins > 0) {
        sx += ins;
        sy += ins;
        sw -= ins * 2;
        sh -= ins * 2;
      }
      return { sx, sy, sw, sh };
    }

    function drawSheetCellInRect(img, col, row, rect) {
      if (!img || !img.naturalWidth) return;
      let { sx, sy, sw, sh } = getSheetCellRect(col, row);
      const clipped = clampSheetSource(img, sx, sy, sw, sh);
      sx = clipped.sx;
      sy = clipped.sy;
      sw = clipped.sw;
      sh = clipped.sh;
      if (sw <= 0 || sh <= 0) return;
      const { x, y, w, h } = rect;
      const fit = rect.fit || 'contain';
      const scale = fit === 'cover'
        ? Math.max(w / sw, h / sh)
        : Math.min(w / sw, h / sh);
      const dw = sw * scale;
      const dh = sh * scale;
      const dx = x + (w - dw) / 2;
      const dy = y + (h - dh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
    }

    function drawTiledSheetCell(img, col, row, destX, destY, destW, destH) {
      if (!img || !img.naturalWidth) return;
      let { sx, sy, sw, sh } = getSheetCellRect(col, row);
      const clipped = clampSheetSource(img, sx, sy, sw, sh);
      sx = clipped.sx;
      sy = clipped.sy;
      sw = clipped.sw;
      sh = clipped.sh;
      if (sw <= 0 || sh <= 0) return;
      const scale = CONFIG.ASSET_SHEET.tileScale != null ? CONFIG.ASSET_SHEET.tileScale : 1;
      const tw = sw * scale;
      const th = sh * scale;
      ctx.save();
      ctx.beginPath();
      ctx.rect(destX, destY, destW, destH);
      ctx.clip();
      for (let tx = 0; tx < destW + tw; tx += tw) {
        for (let ty = 0; ty < destH + th; ty += th) {
          ctx.drawImage(img, sx, sy, sw, sh, destX + tx, destY + ty, tw, th);
        }
      }
      ctx.restore();
    }

    function sheetCellPair(name) {
      const c = CONFIG.ASSET_SHEET.cells[name];
      return c ? c : [0, 0];
    }

    function initAssets(callback) {

              img,
              CONFIG.LOGO_KEY_MAX_RGB
            );
          } else {
            titlePartImages[key] = img;
          }

        });
      });
      if (pending === 0 && callback) callback();
    }

    // ==========================================
    // サウンド機能
    // ==========================================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let lastPaintSoundTime = 0;

    function playSound(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'paint') {
        const nowTs = Date.now();
        if (nowTs - lastPaintSoundTime < 60) return;
        lastPaintSoundTime = nowTs;
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        osc.start(now);
        osc.stop(now + 0.05);
      } else if (type === 'flag') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc.start(now);
        osc.stop(now + 0.05);
      } else if (type === 'close') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.setValueAtTime(880, now + 0.1);
        osc.frequency.setValueAtTime(1320, now + 0.2);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      } else if (type === 'select') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      } else if (type === 'finish') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.linearRampToValueAtTime(440, now + 0.5);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 1.0);
        osc.start(now);
        osc.stop(now + 1.0);
      }
    }

    // ==========================================
    // 入力処理
    // ==========================================
    window.addEventListener('keydown', (e) => {
      if (!keyState[e.code]) {
        handleKeyPress(e.code); 
      }
      keyState[e.code] = true;
    });

    window.addEventListener('keyup', (e) => {
      keyState[e.code] = false;
    });

    function toggleBrowserFullscreen() {
      const root = document.documentElement;
      if (!document.fullscreenElement) {
        root.requestFullscreen?.().catch(() => {});
      } else {
        document.exitFullscreen?.().catch(() => {});
      }
    }

    function handleKeyPress(code) {
      if (code === 'KeyF') {
        toggleBrowserFullscreen();
        return;
      }
      if (state === 'TITLE') {
        if (titleOverlay) {
          if (code === 'Space' || code === 'Enter' || code === 'Escape') {
            playSound('select');
            titleOverlay = null;
          }
          return;
        }
        if (code === 'ArrowUp' || code === 'KeyW') {
          titleMenuIndex = (titleMenuIndex + 3) % 4;
          playSound('select');
          return;
        }
        if (code === 'ArrowDown' || code === 'KeyS') {
          titleMenuIndex = (titleMenuIndex + 1) % 4;
          playSound('select');
          return;
        }
        if (code === 'Space' || code === 'Enter') {
          if (titleMenuIndex === 0) {
            mode = 1;
            startGame();
          } else if (titleMenuIndex === 1) {
            mode = 2;
            startGame();
          } else if (titleMenuIndex === 2) {
            playSound('select');
            titleOverlay = 'OPTIONS';
          } else if (titleMenuIndex === 3) {
            playSound('select');
            titleOverlay = 'CREDITS';
          }
        }
        return;
      } else if (state === 'PLAYING') {
        if (mode === 1) {
          if (code === 'Space' || code === 'Enter') placeFlag(p1, 1);
        } else {
          if (code === 'Space') placeFlag(p1, 1);
          if (code === 'Enter') placeFlag(p2, 2);
        }
      } else if (state === 'RESULT') {
        if (Date.now() - stateStartTime > 2000) {
          if (code === 'Space' || code === 'Enter') {
            playSound('select');
            state = 'TITLE';
            titleMenuIndex = 0;
            titleOverlay = null;
          }
        }
      }
    }

    // ==========================================
    // ゲームロジック
    // ==========================================
    function startGame() {
      state = 'PLAYING';
      stateStartTime = Date.now();
      timeRemaining = CONFIG.GAME_TIME;
      playSound('select');
      
      grid = [];
      effectGrid = [];
      flags1 = [];
      flags2 = [];
      for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
        grid[y] = [];
        effectGrid[y] = [];
        for (let x = 0; x < CONFIG.GRID_COLS; x++) {
          grid[y][x] = 0;
          effectGrid[y][x] = 0;
        }
      }

      // ルビー型エリア内に収まるように初期位置を調整
      p1 = { x: 8 * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, y: 8 * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
      p2 = { x: 23 * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, y: 8 * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };

      cpuTarget = null;
      cpuWaitTimer = 0;

      calcScore();
    }

    function isValidPosition(px, py) {
      const r = (CONFIG.PLAYER_SIZE / 2) - 2; 
      const points = [
        {x: px - r, y: py - r},
        {x: px + r, y: py - r},
        {x: px - r, y: py + r},
        {x: px + r, y: py + r}
      ];
      for (let pt of points) {
        const gx = Math.floor(pt.x / CONFIG.TILE_SIZE);
        const gy = Math.floor(pt.y / CONFIG.TILE_SIZE);
        if (gx < 0 || gx >= CONFIG.GRID_COLS || gy < 0 || gy >= CONFIG.GRID_ROWS) return false;
        if (FIELD_MASK[gy][gx] === ' ') return false;
      }
      return true;
    }

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    function placeFlag(p, playerId) {
      const gx = Math.floor(p.x / CONFIG.TILE_SIZE);
      const gy = Math.floor(p.y / CONFIG.TILE_SIZE);
      
      if (gx < 0 || gx >= CONFIG.GRID_COLS || gy < 0 || gy >= CONFIG.GRID_ROWS) return;
      if (FIELD_MASK[gy][gx] === ' ') return; 

      const flags = playerId === 1 ? flags1 : flags2;
      const existingIdx = flags.findIndex(f => f.gx === gx && f.gy === gy);

      if (existingIdx !== -1) {
        return; 
      } else {
        flags.push({gx, gy});
        if (flags.length === 3) {
          fillPolygon(playerId, flags);
          if (playerId === 1) flags1 = []; else flags2 = [];
          playSound('close');
        } else {
          playSound('flag');
        }
      }
    }

    function fillPolygon(playerId, flags) {
      if (flags.length !== 3) return;

      const [p0, p1, p2] = flags;
      
      const minX = Math.min(p0.gx, p1.gx, p2.gx);
      const maxX = Math.max(p0.gx, p1.gx, p2.gx);
      const minY = Math.min(p0.gy, p1.gy, p2.gy);
      const maxY = Math.max(p0.gy, p1.gy, p2.gy);

      let filledCount = 0;
      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          if (FIELD_MASK[y] && FIELD_MASK[y][x] === ' ') continue;

          if (isPointInTriangle(x, y, p0.gx, p0.gy, p1.gx, p1.gy, p2.gx, p2.gy)) {
            if (grid[y][x] !== playerId) {
              grid[y][x] = playerId;
              effectGrid[y][x] = Date.now();
              filledCount++;
            }
          }
        }
      }
      if (filledCount > 0) {
        calcScore();
        playSound('paint');
      }
    }

    function isPointInTriangle(px, py, x0, y0, x1, y1, x2, y2) {
      const d = (y1 - y2) * (x0 - x2) + (x2 - x1) * (y0 - y2);
      if (d === 0) {
        return (px === x0 && py === y0) || (px === x1 && py === y1) || (px === x2 && py === y2);
      }
      const a = ((y1 - y2) * (px - x2) + (x2 - x1) * (py - y2)) / d;
      const b = ((y2 - y0) * (px - x2) + (x0 - x2) * (py - y2)) / d;
      const c = 1 - a - b;
      const eps = -0.01;
      return a >= eps && b >= eps && c >= eps;
    }

    function calcScore() {
      p1Score = 0;
      p2Score = 0;
      for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
        for (let x = 0; x < CONFIG.GRID_COLS; x++) {
          if (FIELD_MASK[y][x] === ' ') continue;
          if (grid[y][x] === 1) p1Score++;
          if (grid[y][x] === 2) p2Score++;
        }
      }
    }

    function update(dt) {
      if (state === 'PLAYING') {
        timeRemaining -= dt;
        if (timeRemaining <= 0) {
          timeRemaining = 0;
          state = 'RESULT';
          stateStartTime = Date.now();
          playSound('finish');
          return;
        }

        const currentSpeed = timeRemaining <= CONFIG.RUSH_TIME 
          ? CONFIG.BASE_SPEED * CONFIG.SPEED_UP_MULTIPLIER 
          : CONFIG.BASE_SPEED;

        // P1の移動処理
        let dx1 = 0, dy1 = 0;
        if (keyState['KeyW'] || (mode === 1 && keyState['ArrowUp'])) dy1 -= 1;
        if (keyState['KeyS'] || (mode === 1 && keyState['ArrowDown'])) dy1 += 1;
        if (keyState['KeyA'] || (mode === 1 && keyState['ArrowLeft'])) dx1 -= 1;
        if (keyState['KeyD'] || (mode === 1 && keyState['ArrowRight'])) dx1 += 1;

        if (dx1 !== 0 || dy1 !== 0) {
          const len = Math.sqrt(dx1 * dx1 + dy1 * dy1);
          const nextX = p1.x + (dx1 / len) * currentSpeed * dt;
          const nextY = p1.y + (dy1 / len) * currentSpeed * dt;
          
          if (isValidPosition(nextX, p1.y)) p1.x = nextX;
          if (isValidPosition(p1.x, nextY)) p1.y = nextY;
        }

        // P2/CPUの移動処理
        if (mode === 2) {
          let dx2 = 0, dy2 = 0;
          if (keyState['ArrowUp']) dy2 -= 1;
          if (keyState['ArrowDown']) dy2 += 1;
          if (keyState['ArrowLeft']) dx2 -= 1;
          if (keyState['ArrowRight']) dx2 += 1;

          if (dx2 !== 0 || dy2 !== 0) {
            const len = Math.sqrt(dx2 * dx2 + dy2 * dy2);
            const nextX = p2.x + (dx2 / len) * currentSpeed * dt;
            const nextY = p2.y + (dy2 / len) * currentSpeed * dt;
            
            if (isValidPosition(nextX, p2.y)) p2.x = nextX;
            if (isValidPosition(p2.x, nextY)) p2.y = nextY;
          }
        } else if (mode === 1) {
          // ★ CPU制御ロジック
          if (cpuWaitTimer > 0) {
            cpuWaitTimer -= dt;
          } else {
            if (!cpuTarget) {
              let targetTiles = [];
              for(let y=0; y<CONFIG.GRID_ROWS; y++) {
                for(let x=0; x<CONFIG.GRID_COLS; x++) {
                  if(FIELD_MASK[y][x] !== ' ' && grid[y][x] !== 2) {
                    // ★ キャラクターが確実に到達できる安全なマスだけをターゲットにする
                    const tx = x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    const ty = y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    if (isValidPosition(tx, ty)) {
                      targetTiles.push({x: tx, y: ty});
                    }
                  }
                }
              }
              if (targetTiles.length > 0) {
                const targetTile = targetTiles[Math.floor(Math.random() * targetTiles.length)];
                cpuTarget = {
                  x: targetTile.x,
                  y: targetTile.y
                };
              }
            }

            if (cpuTarget) {
              let dx2 = cpuTarget.x - p2.x;
              let dy2 = cpuTarget.y - p2.y;
              const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
              const cpuSpeed = currentSpeed * CONFIG.CPU_SPEED_MULTIPLIER;

              // ★ 到達判定を少し緩くして(5px以内)、ミリ単位のスタックを防止
              if (dist < cpuSpeed * dt || dist < 5) {
                p2.x = cpuTarget.x;
                p2.y = cpuTarget.y;
                placeFlag(p2, 2);
                cpuTarget = null;
                cpuWaitTimer = 0.1 + Math.random() * 0.2;
              } else {
                const nextX = p2.x + (dx2 / dist) * cpuSpeed * dt;
                const nextY = p2.y + (dy2 / dist) * cpuSpeed * dt;
                
                let movedX = false;
                let movedY = false;

                if (isValidPosition(nextX, p2.y)) {
                  p2.x = nextX;
                  movedX = true;
                }
                if (isValidPosition(p2.x, nextY)) {
                  p2.y = nextY;
                  movedY = true;
                }
                
                // ★ CPUが壁に引っかかって完全にスタックした場合はターゲットを取り直す
                if (!movedX && !movedY) {
                   cpuTarget = null;
                   cpuWaitTimer = 0.3; // 少し休んでから再考
                   // 壁へのめり込みを解消するため、少しだけ中央に弾き戻す
                   p2.x += (FIELD_WIDTH / 2 - p2.x) * 0.05;
                   p2.y += (FIELD_HEIGHT / 2 - p2.y) * 0.05;
                }
              }
            }
          }
        }
      }
    }

    // ==========================================
    // 描画処理
    // ==========================================
    function draw() {
      ctx.fillStyle = CONFIG.COLORS.bg;
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

      if (state === 'TITLE') {
        drawTitle();
      } else if (state === 'PLAYING' || state === 'RESULT') {
        drawPlayBackdrop();
        drawField();
        drawUI();
        if (state === 'RESULT') drawResult();
      }
    }

    /** プレイ中：共通背景＋ビネット（フィールドは drawField / HUD は drawUI） */
    function drawPlayBackdrop() {
      const full = {
        x: 0,
        y: 0,
        w: CONFIG.WIDTH,
        h: CONFIG.HEIGHT,
        fit: 'cover'
      };
      if (titleBackgroundImg && titleBackgroundImg.naturalWidth > 0) {
        drawImageInRect(titleBackgroundImg, full);
        drawBackdropVignette(0.06);
      } else if (assetSheetImg && assetSheetImg.naturalWidth > 0) {
        const [bc, br] = sheetCellPair('backgroundPattern');
        drawTiledSheetCell(
          assetSheetImg,
          bc,
          br,
          0,
          0,
          CONFIG.WIDTH,
          CONFIG.HEIGHT
        );
        drawBackdropVignette(0.2);
      } else {
        drawRubyPatternBackdrop();
        drawBackdropVignette(0.22);
      }
    }

    /** 画像未読込時のルビー風ドット＋回路風ライン */
    function drawRubyPatternBackdrop() {
      ctx.save();
      ctx.fillStyle = '#1a0a0a';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      const seed = 7;
      for (let y = 0; y < CONFIG.HEIGHT; y += 24) {
        for (let x = 0; x < CONFIG.WIDTH; x += 24) {
          const v = ((x * 13 + y * 17 + seed) % 37) / 37;
          if (v > 0.72) {
            ctx.fillStyle = 'rgba(180, 40, 55, 0.12)';
            ctx.fillRect(x + 8, y + 6, 6, 8);
            ctx.fillRect(x + 9, y + 5, 4, 10);
          }
        }
      }
      ctx.strokeStyle = 'rgba(80, 30, 40, 0.15)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 12; i++) {
        const y = (i * 47 + 20) % CONFIG.HEIGHT;
        ctx.beginPath();
        ctx.moveTo(0, y);
        for (let x = 0; x < CONFIG.WIDTH; x += 40) {
          ctx.lineTo(x, y + (i % 2 === 0 ? 3 : -3));
        }
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawCornerGlint(x, y, s) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.35, -s * 0.35);
      ctx.lineTo(s, 0);
      ctx.lineTo(s * 0.35, s * 0.35);
      ctx.lineTo(0, s);
      ctx.lineTo(-s * 0.35, s * 0.35);
      ctx.lineTo(-s, 0);
      ctx.lineTo(-s * 0.35, -s * 0.35);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawField() {
      ctx.save();
      ctx.translate(OFFSET_X, OFFSET_Y);
      
      const now = Date.now();

      // タイル描画（背景ロゴ処理を削除し、色塗りつぶしのみに変更）
      for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
        for (let x = 0; x < CONFIG.GRID_COLS; x++) {
          if (FIELD_MASK[y][x] === ' ') continue;

          const owner = grid[y][x];
          const px = x * CONFIG.TILE_SIZE;
          const py = y * CONFIG.TILE_SIZE;

          if (owner === 0) {
            ctx.fillStyle = CONFIG.COLORS.fieldBg;
            ctx.fillRect(px, py, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            ctx.strokeRect(px, py, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
          } else {
            const playerColor = owner === 1 ? CONFIG.COLORS.p1.tile : CONFIG.COLORS.p2.tile;
            ctx.fillStyle = playerColor;
            ctx.fillRect(px, py, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            ctx.strokeRect(px, py, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
          }

          if (effectGrid[y][x]) {
            const elapsed = now - effectGrid[y][x];
            if (elapsed < 100) {
              const scale = 1.2 - (elapsed / 100) * 0.2;
              const size = CONFIG.TILE_SIZE * scale;
              const offset = (CONFIG.TILE_SIZE - size) / 2;
              ctx.fillStyle = CONFIG.COLORS.highlight;
              ctx.fillRect(px + offset, py + offset, size, size);
            } else {
              effectGrid[y][x] = 0;
            }
          }
        }
      }

      // ルビー型（マスクの境界）に沿って外枠線を描画
      ctx.strokeStyle = CONFIG.COLORS.ui;
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
        for (let x = 0; x < CONFIG.GRID_COLS; x++) {
          if (FIELD_MASK[y][x] === ' ') continue;
          
          const px = x * CONFIG.TILE_SIZE;
          const py = y * CONFIG.TILE_SIZE;
          
          if (y === 0 || FIELD_MASK[y-1][x] === ' ') {
            ctx.moveTo(px, py); ctx.lineTo(px + CONFIG.TILE_SIZE, py);
          }
          if (y === CONFIG.GRID_ROWS - 1 || FIELD_MASK[y+1][x] === ' ') {
            ctx.moveTo(px, py + CONFIG.TILE_SIZE); ctx.lineTo(px + CONFIG.TILE_SIZE, py + CONFIG.TILE_SIZE);
          }
          if (x === 0 || FIELD_MASK[y][x-1] === ' ') {
            ctx.moveTo(px, py); ctx.lineTo(px, py + CONFIG.TILE_SIZE);
          }
          if (x === CONFIG.GRID_COLS - 1 || FIELD_MASK[y][x+1] === ' ') {
            ctx.moveTo(px + CONFIG.TILE_SIZE, py); ctx.lineTo(px + CONFIG.TILE_SIZE, py + CONFIG.TILE_SIZE);
          }
        }
      }
      ctx.stroke();

      drawFlags(flags1, CONFIG.COLORS.p1.player);
      drawFlags(flags2, CONFIG.COLORS.p2.player);

      drawPlayer(p1, CONFIG.COLORS.p1.player, false);
      drawPlayer(p2, CONFIG.COLORS.p2.player, true);

      ctx.restore();
    }

    function drawFlags(flags, color) {
      if (flags.length === 0) return;

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      
      for (let i = 0; i < flags.length; i++) {
        const cx = flags[i].gx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
        const cy = flags[i].gy * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
        
        if (i === 0) ctx.moveTo(cx, cy);
        else ctx.lineTo(cx, cy);
        
        ctx.fillStyle = CONFIG.COLORS.ui;
        ctx.fillRect(cx - 3, cy - 3, 6, 6);
        ctx.fillStyle = color;
        ctx.fillRect(cx - 2, cy - 2, 4, 4);
      }
      ctx.stroke();

      const startCx = flags[0].gx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
      const startCy = flags[0].gy * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
      ctx.strokeStyle = CONFIG.COLORS.highlight;
      ctx.lineWidth = 1;
      ctx.strokeRect(startCx - 4, startCy - 4, 8, 8);
    }

    function drawPlayer(p, color, isP2) {
      const pixelSize = 1.2; 
      const w = 32 * pixelSize; 
      const h = 30 * pixelSize; 
      
      ctx.save();
      ctx.translate(p.x, p.y);

      if (isP2) {
        ctx.scale(-1, 1);
      }

      ctx.translate(-w / 2, -h / 2);

      for (let y = 0; y < PLAYER_SPRITE.length; y++) {
        const row = PLAYER_SPRITE[y];
        for (let x = 0; x < row.length; x++) {
          const char = row[x];
          if (char === ' ') continue;
          
          let fillCol = color;
          let overlayCol = null;

          if (char === '0') { fillCol = '#1f1f2e'; } 
          else if (char === '1') { fillCol = color; overlayCol = 'rgba(0, 0, 0, 0.35)'; } 
          else if (char === '2') { fillCol = color; } 
          else if (char === '3') { fillCol = color; overlayCol = 'rgba(255, 255, 255, 0.4)'; } 
          else if (char === '4') { fillCol = '#ffffff'; } 
          else if (char === '5') { fillCol = '#2a2a35'; } 
          else if (char === '6') { fillCol = '#2a2a35'; } 
          else if (char === '7') { fillCol = '#e65c5c'; } 
          
          ctx.fillStyle = fillCol;
          ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
          
          if (overlayCol) {
            ctx.fillStyle = overlayCol;
            ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
          }
        }
      }
      
      ctx.restore();
    }

    function drawUI() {
      ctx.textBaseline = 'middle';
      const gold = CONFIG.COLORS.hudGold;

      ctx.textAlign = 'left';
      ctx.font = '17px "Press Start 2P", monospace';
      ctx.fillStyle = CONFIG.COLORS.p1.tile;
      ctx.fillText(`P1:${p1Score.toString().padStart(3, '0')}`, 14, 48);

      ctx.textAlign = 'right';
      ctx.fillStyle = CONFIG.COLORS.p2.tile;
      const p2Label = mode === 1 ? 'CPU' : 'P2';
      ctx.fillText(`${p2Label}:${p2Score.toString().padStart(3, '0')}`, CONFIG.WIDTH - 14, 48);

      let timerColor = gold;
      if (timeRemaining <= CONFIG.RUSH_TIME && Math.floor(Date.now() / 100) % 2 === 0) {
        timerColor = CONFIG.COLORS.p1.tile;
      }
      ctx.textAlign = 'center';
      ctx.font = '38px "Press Start 2P", monospace';
      ctx.fillStyle = '#000000';
      ctx.fillText(Math.ceil(timeRemaining).toString().padStart(2, '0'), CONFIG.WIDTH / 2 + 2, 52);
      ctx.fillStyle = timerColor;
      ctx.fillText(Math.ceil(timeRemaining).toString().padStart(2, '0'), CONFIG.WIDTH / 2, 50);

      drawCornerGlint(CONFIG.WIDTH - 24, CONFIG.HEIGHT - 24, 8);
    }

    function drawTitleMenuAndFooter() {
      const L = UI_LAYOUT.title;
      const labels = ['1P VS CPU', '1P VS 2P', 'OPTIONS', 'CREDITS'];
      const cx = CONFIG.WIDTH / 2;
      const menuFooterMink = '#e8c6c0';
      ctx.textBaseline = 'middle';
      ctx.font = '18px "Press Start 2P", monospace';
      const row0 = L.menu.y + 40;
      const rowGap = 32;
      for (let i = 0; i < labels.length; i++) {
        const y = row0 + i * rowGap;
        const label = labels[i];
        const tw = ctx.measureText(label).width;
        ctx.textAlign = 'center';
        ctx.fillStyle = menuFooterMink;
        ctx.fillText(label, cx, y);
        if (titleMenuIndex === i) {
          ctx.textAlign = 'right';
          ctx.fillStyle = menuFooterMink;
          ctx.fillText('>', cx - tw / 2 - 14, y);
        }
      }

      ctx.fillStyle = menuFooterMink;
      ctx.textAlign = 'center';
      ctx.font = '11px "Press Start 2P", monospace';
      ctx.fillText('CONTROLS: P1 - WASD / SPACE, P2 - ARROWS / ENTER', CONFIG.WIDTH / 2, L.footerControlsY);
      ctx.fillText('F: BROWSER FULLSCREEN', CONFIG.WIDTH / 2, L.footerFullscreenY);
      ctx.font = '9px "Press Start 2P", monospace';
      ctx.fillText('© 2024 JUGGING CO., LTD. ALL RIGHTS RESERVED.', CONFIG.WIDTH / 2, L.footerCopyrightY);
      ctx.textAlign = 'right';
      drawCornerGlint(CONFIG.WIDTH - 20, CONFIG.HEIGHT - 20, 8);
    }

    function drawTitleOverlayModal() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.72)';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      const bx = 120;
      const by = 160;
      const bw = CONFIG.WIDTH - 240;
      const bh = 220;
      ctx.fillStyle = '#2a1010';
      ctx.strokeStyle = CONFIG.COLORS.hudGold;
      ctx.lineWidth = 3;
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(bx, by, bw, bh, 10);
      } else {
        ctx.rect(bx, by, bw, bh);
      }
      ctx.fill();
      ctx.stroke();

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '18px "Press Start 2P", monospace';
      ctx.fillStyle = CONFIG.COLORS.hudGold;
      if (titleOverlay === 'OPTIONS') {
        ctx.fillText('OPTIONS', CONFIG.WIDTH / 2, by + 40);
        ctx.font = '11px "Press Start 2P", monospace';
        ctx.fillStyle = CONFIG.COLORS.ui;
        ctx.fillText('COMING SOON', CONFIG.WIDTH / 2, by + 95);
        ctx.fillText('SOUND / KEY CONFIG', CONFIG.WIDTH / 2, by + 125);
      } else {
        ctx.fillText('CREDITS', CONFIG.WIDTH / 2, by + 40);
        ctx.font = '10px "Press Start 2P", monospace';
        ctx.fillStyle = CONFIG.COLORS.ui;
        ctx.fillText('TITLE & GAME UI DESIGN', CONFIG.WIDTH / 2, by + 88);
        ctx.fillText('RUBYFIGHT / RUBYKAIGI', CONFIG.WIDTH / 2, by + 115);
        ctx.fillText('© 2024 JUGGING CO., LTD.', CONFIG.WIDTH / 2, by + 145);
      }
      ctx.font = '9px "Press Start 2P", monospace';
      ctx.fillStyle = '#ffaaaa';
      const blink = Math.floor(Date.now() / 400) % 2 === 0;
      if (blink) {
        ctx.fillText('PRESS ENTER / SPACE TO CLOSE', CONFIG.WIDTH / 2, by + bh - 28);
      }
    }

    function drawTitle() {
      ctx.fillStyle = CONFIG.COLORS.bg;
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      const L = UI_LAYOUT.title;
      const P = L.parts;
      const sheetOk = !!(assetSheetImg && assetSheetImg.naturalWidth > 0);
      const hasTitleBg = !!(titleBackgroundImg && titleBackgroundImg.naturalWidth > 0);

      if (hasTitleBg) {
        drawImageInRect(titleBackgroundImg, { ...P.background, fit: 'cover' });
        drawBackdropVignette(0.06);
      } else if (sheetOk) {
        const [bgc, bgr] = sheetCellPair('backgroundPattern');
        drawTiledSheetCell(assetSheetImg, bgc, bgr, 0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
        drawBackdropVignette(0.12);
      } else if (titlePartImages.background) {
        drawImageInRect(titlePartImages.background, P.background);
        drawBackdropVignette(0.18);
      } else {
        drawRubyPatternBackdrop();
        drawBackdropVignette(0.38);
      }

      const hasLogoPng = drawableSize(titlePartImages.logo).w > 0;
      if (hasLogoPng) {
        drawImageInRect(titlePartImages.logo, P.logo);
      } else if (sheetOk) {
        const [lgc, lgr] = sheetCellPair('logo');
        drawSheetCellInRect(assetSheetImg, lgc, lgr, P.logo);
      } else {
        drawTitleLogoBlock(L);
      }

      if (drawableSize(titleCharRedSheetImg).w > 0) {
        drawTitleCharRedSpriteSheet(P.charLeft);
      } else if (drawableSize(titlePartImages.charLeft).w > 0) {
        drawImageInRect(titlePartImages.charLeft, P.charLeft);
      } else if (sheetOk) {
        const [rc, rr] = sheetCellPair('charRed');
        drawSheetCellInRect(assetSheetImg, rc, rr, P.charLeft);
      } else {
        drawTitleMascotsLeftOnly(L);
      }

      if (drawableSize(titleCharBlueSheetImg).w > 0) {
        drawTitleCharBlueSpriteSheet(P.charRight);
      } else if (drawableSize(titlePartImages.charRight).w > 0) {
        drawImageInRect(titlePartImages.charRight, P.charRight);
      } else if (sheetOk) {
        const [bc, br] = sheetCellPair('charBlue');
        drawSheetCellInRect(assetSheetImg, bc, br, P.charRight);
      } else {
        drawTitleMascotsRightOnly(L);
      }

      drawTitleMenuAndFooter();
      if (titleOverlay) drawTitleOverlayModal();
    }

    function drawResult() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

      ctx.textAlign = 'center';
      ctx.font = '48px "Press Start 2P", monospace';
      ctx.fillStyle = CONFIG.COLORS.ui;
      ctx.fillText("TIME UP!", CONFIG.WIDTH / 2, 180);

      ctx.font = '32px "Press Start 2P", monospace';
      let msg = "";
      if (p1Score > p2Score) {
        msg = "P1 WINS!";
        ctx.fillStyle = CONFIG.COLORS.p1.tile;
      } else if (p2Score > p1Score) {
        msg = mode === 1 ? "CPU WINS!" : "P2 WINS!";
        ctx.fillStyle = CONFIG.COLORS.p2.tile;
      } else {
        msg = "DRAW!";
        ctx.fillStyle = CONFIG.COLORS.ui;
      }
      ctx.fillText(msg, CONFIG.WIDTH / 2, 260);

      if (Date.now() - stateStartTime > 2000) {
        ctx.font = '16px "Press Start 2P", monospace';
        ctx.fillStyle = (Math.floor(Date.now() / 500) % 2 === 0) ? CONFIG.COLORS.ui : '#ffaaaa';
        ctx.fillText("PRESS SPACE TO RETURN", CONFIG.WIDTH / 2, 360);
      }
    }

    // ==========================================
    // メインループ
    // ==========================================
    function gameLoop(now) {
      const dt = (now - lastTime) / 1000;
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    document.fonts.ready.then(() => {
      initAssets(() => {
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
      });
    });

  </script>
