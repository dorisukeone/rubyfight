<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUBYFIGHT</title>
  <!-- ピクセルフォントの読み込み -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      min-height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }
    canvas {
      /* 16:9 を保ちつつビューポートに最大表示。論理座標 960×540 は JS で devicePixelRatio 倍のバッファに描く */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      background-color: #2e0f0f; /* デフォルト背景（赤系） */
    }
    #gameCanvas:focus {
      outline: none;
    }
  </style>
</head>
<body>

  <script src="build/rubyfight.js"></script>
  <script>
    function safeParseJsonMaybeOpal(val) {
      if (val == null) return null;
      try {
        if (typeof val === 'string') return JSON.parse(val);
        if (typeof val === 'object' && val !== null && !Array.isArray(val)) {
          var w = val.WIDTH;
          if (typeof w === 'number') return val;
        }
        return JSON.parse(String(val));
      } catch (e) {
        console.warn('[RUBYFIGHT] JSON parse error', e);
        return null;
      }
    }

      if (_maskOk) useRubyPageData = true;

    const UI_LAYOUT = useRubyPageData ? ((_rbUi && _rbUi.title) ? _rbUi : FALLBACK_UI_LAYOUT) : FALLBACK_UI_LAYOUT;

    // ==========================================
    const canvas = document.getElementById('gameCanvas');
    canvas.tabIndex = 0;
    canvas.setAttribute('aria-label', 'RUBYFIGHT');
    canvas.addEventListener('mousedown', function () { canvas.focus({ preventScroll: true }); });
    canvas.addEventListener('touchstart', function () { canvas.focus({ preventScroll: true }); }, { passive: true });
    const ctx = canvas.getContext('2d');
    let _rbCanvasBackingDpr = 0;
    /** Retina 等で CSS 拡大後ににじまないよう、バッファを論理サイズ×DPR に合わせる（論理座標は常に CONFIG と同一） */
    function syncGameCanvasBackingStore() {
      const lw = CONFIG.WIDTH;
      const lh = CONFIG.HEIGHT;
      const dpr = Math.min(window.devicePixelRatio || 1, 3);
      const bw = Math.max(1, Math.round(lw * dpr));
      const bh = Math.max(1, Math.round(lh * dpr));
      if (_rbCanvasBackingDpr === dpr && canvas.width === bw && canvas.height === bh) return;
      _rbCanvasBackingDpr = dpr;
      canvas.width = bw;
      canvas.height = bh;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
      if ('imageSmoothingQuality' in ctx) ctx.imageSmoothingQuality = 'low';
    }
    syncGameCanvasBackingStore();
    window.addEventListener('resize', function () {
      syncGameCanvasBackingStore();
    });

    /** 9 引数 drawImage。描画先・元矩形を Math.round してサブピクセル補間の「ぬるっと感」を防ぐ */
    function drawImage9Int(img, sx, sy, sw, sh, dx, dy, dw, dh) {
      ctx.drawImage(
        img,
        Math.round(sx), Math.round(sy), Math.round(sw), Math.round(sh),
        Math.round(dx), Math.round(dy), Math.round(dw), Math.round(dh)
      );
    }

    /** スプライトアトラス用：元矩形はそのまま、先だけ整数化（隣コマの色がにじむのを抑える） */
    function drawImage9SpriteAtlas(img, sx, sy, sw, sh, dx, dy, dw, dh) {
      ctx.drawImage(
        img,
        sx, sy, sw, sh,
        Math.round(dx), Math.round(dy), Math.round(dw), Math.round(dh)
      );
    }

    /** タイトル用：低解像度コマを拡大するとき NN がギザつくため一時的にスムージング */
    function drawImage9IntSmoothUpscale(img, sx, sy, sw, sh, dx, dy, dw, dh) {
      ctx.save();
      ctx.imageSmoothingEnabled = true;
      if ('imageSmoothingQuality' in ctx) ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(
        img,
        Math.round(sx), Math.round(sy), Math.round(sw), Math.round(sh),
        Math.round(dx), Math.round(dy), Math.round(dw), Math.round(dh)
      );
      ctx.restore();
    }

    function drawPixelSprite(sprite, palette, pixelSize, cx, cy) {
      const rows = sprite.length;
      const cols = sprite[0].length;
      const w = cols * pixelSize;
      const h = rows * pixelSize;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.translate(-w / 2, -h / 2);
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const ch = sprite[y][x];
          if (ch === '.' || ch === ' ') continue;
          const col = palette[ch];
          if (!col) continue;
          ctx.fillStyle = col;
          ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
        }
      }
      ctx.restore();
    }

    /** タイトル「RUBY」ミニルビーと陣地セルで共通（上が平らな冠・下にキュレット） */
    function appendRubyGemSilhouette(ctx, cx, cy, s) {
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s * 0.45, cy - s * 0.35);
      ctx.lineTo(cx + s, cy);
      ctx.lineTo(cx, cy + s * 0.85);
      ctx.lineTo(cx - s, cy);
      ctx.lineTo(cx - s * 0.45, cy - s * 0.35);
      ctx.closePath();
    }

    function drawMiniRuby(cx, cy, s) {
      ctx.save();
      ctx.translate(cx, cy);
      appendRubyGemSilhouette(ctx, 0, 0, s);
      ctx.fillStyle = '#b01830';
      ctx.fill();
      ctx.strokeStyle = '#1a0a0a';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,200,220,0.5)';
      ctx.fillRect(-s * 0.15, -s * 0.35, s * 0.2, s * 0.25);
      ctx.restore();
    }

    function drawTitleLogoBlock(L) {
      const cx = L.logoCenterX;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const jy = L.juggingY;
      ctx.strokeStyle = '#ff7bb2';
      ctx.lineWidth = 2;
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(cx - 112, jy - 18, 224, 36, 8);
      } else {
        ctx.rect(cx - 112, jy - 18, 224, 36);
      }
      ctx.stroke();
      ctx.font = '16px "Press Start 2P", monospace';
      ctx.fillStyle = '#ffb8d8';
      ctx.fillText('JUGGING', cx, jy + 2);
      ctx.fillStyle = '#9ec0ff';
      ctx.fillText('JUGGING', cx, jy);

      const ty = L.mainTitleY;
      const left = 'RUBY';
      const right = 'FIGHT';
      ctx.font = '48px "Press Start 2P", monospace';
      const wL = ctx.measureText(left).width;
      const wR = ctx.measureText(right).width;
      const gap = 10;
      const rubySlot = 34;
      const totalW = wL + gap + rubySlot + gap + wR;
      const x0 = cx - totalW / 2;
      const xRuby = x0 + wL + gap + rubySlot / 2;
      const drawChunk = (text, tcx) => {
        ctx.lineWidth = 8;
        ctx.strokeStyle = '#0a0a0a';
        ctx.lineJoin = 'round';
        ctx.strokeText(text, tcx, ty + 2);
        ctx.fillStyle = '#e89820';
        ctx.fillText(text, tcx, ty + 2);
        ctx.strokeText(text, tcx, ty);
        ctx.fillStyle = '#f5d060';
        ctx.fillText(text, tcx, ty);

      drawMiniRuby(xRuby, ty, 15);
      drawChunk(right, x0 + wL + gap + rubySlot + gap + wR / 2);

      ctx.font = '12px "Press Start 2P", monospace';
      ctx.strokeStyle = '#2a1408';
      ctx.strokeText('TERRITORY FIGHT', cx, L.subTerritoryY);
      ctx.fillStyle = '#f0c040';
      ctx.fillText('TERRITORY FIGHT', cx, L.subTerritoryY);

      ctx.fillStyle = '#ffffff';
      ctx.font = '10px "Press Start 2P", monospace';
      ctx.fillText('TM', cx + totalW / 2 + 22, ty - 32);
    }

    function drawBackdropVignette(strength) {
      const g = ctx.createRadialGradient(
        CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.HEIGHT * 0.15,
        CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.HEIGHT * 0.85
      );
      g.addColorStop(0, `rgba(0,0,0,0)`);
      g.addColorStop(1, `rgba(10,0,0,${strength})`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    }

    function resolveAssetURL(src) {
      try {
        return new URL(src, window.location.href).href;
      } catch (e) {
        return src;
      }
    }

    function drawableSize(d) {
      if (!d) return { w: 0, h: 0 };
      const w = d.naturalWidth || d.width || 0;
      const h = d.naturalHeight || d.height || 0;
      return { w, h };
    }

    /**
     * 画像周縁から「近黒」で連結しているピクセルだけ α=0（ベタ黒背景用。Canvas を返す）
     */
    function removeEdgeConnectedNearBlack(img, maxRgb) {
      const max = maxRgb != null ? maxRgb : 32;
      const { w, h } = drawableSize(img);
      if (!w || !h) return img;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const c2d = canvas.getContext('2d');
      c2d.imageSmoothingEnabled = false;
      c2d.drawImage(img, 0, 0);
      const imageData = c2d.getImageData(0, 0, w, h);
      const d = imageData.data;
      const isKey = (i) =>
        d[i] <= max && d[i + 1] <= max && d[i + 2] <= max;
      const seen = new Uint8Array(w * h);
      const q = [];
      const tryPush = (x, y) => {
        if (x < 0 || x >= w || y < 0 || y >= h) return;
        const p = y * w + x;
        if (seen[p]) return;
        const i = p * 4;
        if (!isKey(i)) return;
        seen[p] = 1;
        q.push(p);
      };
      for (let x = 0; x < w; x++) {
        tryPush(x, 0);
        tryPush(x, h - 1);
      }
      for (let y = 0; y < h; y++) {
        tryPush(0, y);
        tryPush(w - 1, y);
      }
      let qi = 0;
      while (qi < q.length) {
        const p = q[qi++];
        const i = p * 4;
        d[i + 3] = 0;
        const x = p % w;
        const y = (p / w) | 0;
        const nbr = [
          [x + 1, y],
          [x - 1, y],
          [x, y + 1],
          [x, y - 1]
        ];
        for (let k = 0; k < 4; k++) {
          const nx = nbr[k][0];
          const ny = nbr[k][1];
          if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
            const p2 = ny * w + nx;
            if (!seen[p2] && isKey(p2 * 4)) {
              seen[p2] = 1;
              q.push(p2);
            }
          }
        }
      }
      c2d.putImageData(imageData, 0, 0);
      return canvas;
    }

    /**
     * 周縁から「近白」で連結しているピクセルだけ α=0（ベタ白背景用）
     */
    function removeEdgeConnectedNearWhite(img, minRgb) {
      const min = minRgb != null ? minRgb : 248;
      const { w, h } = drawableSize(img);
      if (!w || !h) return img;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const c2d = canvas.getContext('2d');
      c2d.imageSmoothingEnabled = false;
      c2d.drawImage(img, 0, 0);
      const imageData = c2d.getImageData(0, 0, w, h);
      const d = imageData.data;
      const isKey = (i) =>
        d[i] >= min && d[i + 1] >= min && d[i + 2] >= min;
      const seen = new Uint8Array(w * h);
      const q = [];
      const tryPush = (x, y) => {
        if (x < 0 || x >= w || y < 0 || y >= h) return;
        const p = y * w + x;
        if (seen[p]) return;
        const i = p * 4;
        if (!isKey(i)) return;
        seen[p] = 1;
        q.push(p);
      };
      for (let x = 0; x < w; x++) {
        tryPush(x, 0);
        tryPush(x, h - 1);
      }
      for (let y = 0; y < h; y++) {
        tryPush(0, y);
        tryPush(w - 1, y);
      }
      let qi = 0;
      while (qi < q.length) {
        const p = q[qi++];
        const i = p * 4;
        d[i + 3] = 0;
        const x = p % w;
        const y = (p / w) | 0;
        const nbr = [
          [x + 1, y],
          [x - 1, y],
          [x, y + 1],
          [x, y - 1]
        ];
        for (let k = 0; k < 4; k++) {
          const nx = nbr[k][0];
          const ny = nbr[k][1];
          if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
            const p2 = ny * w + nx;
            if (!seen[p2] && isKey(p2 * 4)) {
              seen[p2] = 1;
              q.push(p2);
            }
          }
        }
      }
      c2d.putImageData(imageData, 0, 0);
      return canvas;
    }

    /**
     * ベタ黒〜近黒の背景だけ透過（周縁から BFS）。4 近傍に「十分明るい」色があれば黒も保護（輪郭・目など）
     */
    function removeBorderConnectedDarkMatte(img, darkMax, colorMin) {
      const dMax = darkMax != null ? darkMax : 40;
      const cMin = colorMin != null ? colorMin : 45;
      const { w, h } = drawableSize(img);
      if (!w || !h) return img;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const c2d = canvas.getContext('2d');
      c2d.imageSmoothingEnabled = false;
      c2d.drawImage(img, 0, 0);
      const imageData = c2d.getImageData(0, 0, w, h);
      const d = imageData.data;
      const maxCh = (i) =>
        Math.max(d[i], d[i + 1], d[i + 2]);
      const isDark = (i) => maxCh(i) <= dMax;
      const isBright = (i) => maxCh(i) > cMin;
      const isProtected = (x, y) => {
        const i = (y * w + x) * 4;
        if (!isDark(i)) return false;
        if (x + 1 < w && isBright((y * w + x + 1) * 4)) return true;
        if (x > 0 && isBright((y * w + x - 1) * 4)) return true;
        if (y + 1 < h && isBright(((y + 1) * w + x) * 4)) return true;
        if (y > 0 && isBright(((y - 1) * w + x) * 4)) return true;
        return false;
      };
      const seen = new Uint8Array(w * h);
      const q = [];
      const tryPush = (x, y) => {
        if (x < 0 || x >= w || y < 0 || y >= h) return;
        const p = y * w + x;
        if (seen[p]) return;
        const i = p * 4;
        if (!isDark(i) || isProtected(x, y)) return;
        seen[p] = 1;
        q.push(p);
      };
      for (let x = 0; x < w; x++) {
        tryPush(x, 0);
        tryPush(x, h - 1);
      }
      for (let y = 0; y < h; y++) {
        tryPush(0, y);
        tryPush(w - 1, y);
      }
      let qi = 0;
      while (qi < q.length) {
        const p = q[qi++];
        const i = p * 4;
        d[i + 3] = 0;
        const x = p % w;
        const y = (p / w) | 0;
        tryPush(x + 1, y);
        tryPush(x - 1, y);
        tryPush(x, y + 1);
        tryPush(x, y - 1);
      }
      c2d.putImageData(imageData, 0, 0);
      return canvas;
    }

    /**
     * 各ピクセルで max(r,g,b) <= m なら α=0。ベタの暗色地（a=255）が多いスプライト帯用。
     * removeEdgeBlack は辺に繋がらない地が残るが、本処理は 1 フレーム内の穴も抜く。
     */
    function keyDarkByMaxChannel(img, maxM) {
      const m = Number(maxM);
      if (!isFinite(m) || m < 0) return img;
      const { w, h } = drawableSize(img);
      if (!w || !h) return img;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const c2d = canvas.getContext('2d');
      c2d.imageSmoothingEnabled = false;
      c2d.drawImage(img, 0, 0);
      const imageData = c2d.getImageData(0, 0, w, h);
      const d = imageData.data;
      const len = w * h;
      for (let p = 0; p < len; p++) {
        const i = p * 4;
        if (d[i + 3] === 0) continue;
        const M = Math.max(d[i], d[i + 1], d[i + 2]);
        if (M <= m) d[i + 3] = 0;
      }
      c2d.putImageData(imageData, 0, 0);
      return canvas;
    }

    /** file:// では crossOrigin 付きが失敗することがあるため付けない（同一オリジンの PNG のみ） */
    function loadImageSrc(src) {
      return new Promise((resolve) => {
        if (!src) {
          resolve(null);
          return;
        }
        const url = resolveAssetURL(src);
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => {
          console.warn('[RUBYFIGHT] 画像を読み込めません:', url);
          resolve(null);
        };
        img.src = url;
      });
    }

    // Canvas 描画用の幾何は常に下記 JS のみ（Opal 橋の Float 微差でサブピクセルに寄り「スライド」するのを防ぐ。Ruby の定義は MRI テスト用）
    function clampSheetSource(img, sx, sy, sw, sh) {
      const ds = drawableSize(img);
      const iw = ds.w;
      const ih = ds.h;
      let x = sx;
      let y = sy;
      let w = sw;
      let h = sh;
      if (x < 0) {
        w += x;
        x = 0;
      }
      if (y < 0) {
        h += y;
        y = 0;
      }
      if (x + w > iw) w = iw - x;
      if (y + h > ih) h = ih - y;
      return { sx: x, sy: y, sw: Math.max(0, w), sh: Math.max(0, h) };
    }

    /** 余りピクセルを先頭列に足す（既定）／末尾列に足す（remainderToEnd。エクスポートによって使い分け） */
    function cellAxisStartsAndSizes(total, n, remainderToEnd) {
      const c = Math.max(1, Math.floor(n));
      const t = Math.max(0, Math.floor(total));
      const base = Math.floor(t / c);
      const rem = t % c;
      const re = remainderToEnd === true;
      const sizes = [];
      for (let i = 0; i < c; i++) {
        if (re) {
          sizes.push(base + (rem > 0 && i >= c - rem ? 1 : 0));
        } else {
          sizes.push(base + (i < rem ? 1 : 0));
        }
      }
      const starts = [];
      let acc = 0;
      for (let i = 0; i < c; i++) {
        starts.push(acc);
        acc += sizes[i];
      }
      return { starts, sizes };
    }

    function getUniformSpriteFrameRect(imgW, imgH, cols, rows, frameIndex, frameLayout, remainderToEnd) {
      const fi = Math.max(0, Math.floor(Number(frameIndex)) || 0);
      const fl = (frameLayout != null && String(frameLayout) !== '') ? String(frameLayout) : 'row';
      const nc = Math.max(1, Math.floor(cols) || 1);
      const nr = Math.max(1, Math.floor(rows) || 1);
      let col; let row;
      if (fl === 'column' || fl === 'column_major') {
        col = Math.floor(fi / nr);
        row = fi % nr;
      } else {
        col = fi % nc;
        row = Math.floor(fi / nc);
      }
      const colAxis = cellAxisStartsAndSizes(imgW, nc, remainderToEnd);
      const rowAxis = cellAxisStartsAndSizes(imgH, nr, remainderToEnd);
      const sx = colAxis.starts[col] || 0;
      const sy = rowAxis.starts[row] || 0;
      const sw = colAxis.sizes[col] || 0;
      const sh = rowAxis.sizes[row] || 0;
      return { sx, sy, sw, sh };
    }

    function drawSpriteFrameInRect(img, sx, sy, sw, sh, rect) {
      if (!img || sw <= 0 || sh <= 0) return;
      const { x, y } = rect;
      const w = Number(rect.w);
      const h = Number(rect.h);
      if (!isFinite(w) || !isFinite(h) || w < 8 || h < 8) return;
      const fit = rect.fit || 'contain';
      const vAlign = rect.vAlign || 'center';
      const fstr = String(fit || 'contain');
      const u = rect.uniformSourceCell;
      let scale;
      if (u && isFinite(u.w) && isFinite(u.h) && u.w > 0 && u.h > 0) {
        // 1 グリッドセル分の基準寸法で拡大率を共通化（各コマの sw/sh 差で足元・中心が毎フレームずれないようにする）
        scale = fstr === 'cover' ? Math.max(w / u.w, h / u.h) : Math.min(w / u.w, h / u.h);
      } else {
        scale = fstr === 'cover' ? Math.max(w / sw, h / sh) : Math.min(w / sw, h / sh);
      }
      let scaleMul = Number(rect.scaleMul);
      if (!isFinite(scaleMul) || scaleMul <= 0) scaleMul = 1;
      scale *= scaleMul;
      // uniformSourceCell 時は描画先 dw/dh を u.w/u.h 基準に固定（1024%9 などで sw がコマごとに 1px 違うと dx が揺れて横スライドする）
      let dw; let dh;
      if (u && isFinite(u.w) && isFinite(u.h) && u.w > 0 && u.h > 0) {
        dw = u.w * scale;
        dh = u.h * scale;
      } else {
        dw = sw * scale;
        dh = sh * scale;
      }
      // 先に描画サイズを整数化してから位置を決める（浮動 dw と Math.round(dx) の組み合わせでフレーム間 1px 横揺れしやすい）
      const dwi = Math.max(1, Math.round(dw));
      const dhi = Math.max(1, Math.round(dh));
      const nudgeX = isFinite(rect.drawOffsetX) ? Math.trunc(rect.drawOffsetX) : 0;
      const nudgeY = isFinite(rect.drawOffsetY) ? Math.trunc(rect.drawOffsetY) : 0;
      const dx = Math.round(x + (w - dwi) / 2) + nudgeX;
      let dy;
      if (vAlign === 'bottom') {
        dy = Math.round(y + h - dhi);
      } else if (vAlign === 'top') {
        dy = Math.round(y);
      } else {
        dy = Math.round(y + (h - dhi) / 2);
      }
      dy += nudgeY;
      const doClip = rect.clip && fstr === 'cover';
      if (doClip) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, w, h);
        ctx.clip();
      }
      if (rect.atlasSourceExact) {
        drawImage9SpriteAtlas(img, sx, sy, sw, sh, dx, dy, dwi, dhi);
      } else if (rect.sheetSmoothUpscale === true && fstr === 'contain') {
        drawImage9IntSmoothUpscale(img, sx, sy, sw, sh, dx, dy, dwi, dhi);
      } else {
        drawImage9Int(img, sx, sy, sw, sh, dx, dy, dwi, dhi);
      }
      if (doClip) ctx.restore();
    }

    function drawTitleCharSpriteSheet(img, S, rect) {
      if (!S || !S.url || !img) return;
      const { w, h } = drawableSize(img);
      if (!w || !h) return;
      const cols = Math.max(1, Math.floor(Number(S.cols)) || 4);
      const rows = Math.max(1, Math.floor(Number(S.rows)) || 4);
      const fw = Number(S.frameWidth);
      const fh = Number(S.frameHeight);
      const needW = isFinite(fw) && fw > 0 ? fw * cols : 0;
      const needH = isFinite(fh) && fh > 0 ? fh * rows : 0;
      const useFixedFrames =
        needW > 0 &&
        needH > 0 &&
        w + 2 >= needW &&
        h + 2 >= needH;
      if (!img._rbTitleCharGridCheck) {
        img._rbTitleCharGridCheck = true;
        if (needW > 0 && needH > 0 && !useFixedFrames) {
          console.warn(
            '[RUBYFIGHT] タイトル赤シート: 画像が frameWidth×cols（' +
              needW +
              '×' +
              needH +
              '）未満のため等分割で切り出しています。右や下が欠ける場合は 648×929×24 列のシートに差し替えてください。',
            { width: w, height: h, cols, rows, frameWidth: fw, frameHeight: fh }
          );
        } else if (!useFixedFrames) {
          const rw = w % cols;
          const rh = h % rows;
          if (rw > 2 || rh > 2) {
            console.warn(
              '[RUBYFIGHT] タイトル用スプライトシートのピクセル幅・高さが cols/rows に対して大きく割り切れません。切り出し枠のズレで揺れます。',
              { width: w, height: h, cols, rows, widthRemainder: rw, heightRemainder: rh },
              '例: 4x4 なら幅・高さを 4 の倍数に揃えるか、cols/rows を実寸に合わせてください。'
            );
          }
        }
      }
      const total = cols * rows;
      const fps = Math.max(0.001, Number(S.fps)) || 6;
      const start = Math.max(0, Math.floor(Number(S.frameStart != null ? S.frameStart : 0)));
      const count = Math.max(1, Math.floor(Number(S.frameCount != null ? S.frameCount : total)));
      const tick = Math.floor(Date.now() / (1000 / fps));
      let f = Math.min(start + (tick % Math.max(1, count)), total - 1);
      f = Math.max(0, Math.floor(Number(f)) || 0);
      const frameLayout = (S.frameLayout != null && S.frameLayout !== '') ? S.frameLayout : 'row';
      const remEnd = S.sheetCellRemainderToEnd === true;
      let sx; let sy; let sw; let sh; let uW; let uH;
      if (useFixedFrames) {
        let col; let row;
        if (frameLayout === 'column' || frameLayout === 'column_major') {
          col = Math.floor(f / rows);
          row = f % rows;
        } else {
          col = f % cols;
          row = Math.floor(f / cols);
        }
        sx = col * fw;
        sy = row * fh;
        sw = fw;
        sh = fh;
        uW = fw;
        uH = fh;
      } else {
        const r0 = getUniformSpriteFrameRect(w, h, cols, rows, f, frameLayout, remEnd);
        sx = r0.sx;
        sy = r0.sy;
        sw = r0.sw;
        sh = r0.sh;
        const colAxis = cellAxisStartsAndSizes(w, cols, remEnd);
        const rowAxis = cellAxisStartsAndSizes(h, rows, remEnd);
        uW = Math.max.apply(null, colAxis.sizes);
        uH = Math.max.apply(null, rowAxis.sizes);
      }
      {
        const legacy = Math.max(0, Math.floor(Number(S.sheetSourceInset != null ? S.sheetSourceInset : 0)));
        const hasIX = S.sheetSourceInsetX != null && S.sheetSourceInsetX !== '';
        const hasIY = S.sheetSourceInsetY != null && S.sheetSourceInsetY !== '';
        const ix = hasIX ? Math.max(0, Math.floor(Number(S.sheetSourceInsetX))) : legacy;
        const iy = hasIY ? Math.max(0, Math.floor(Number(S.sheetSourceInsetY))) : legacy;
        if (ix > 0 && sw > ix * 2) {
          sx += ix;
          sw -= ix * 2;
          uW = Math.max(1, uW - ix * 2);
        }
        if (iy > 0 && sh > iy * 2) {
          sy += iy;
          sh -= iy * 2;
          uH = Math.max(1, uH - iy * 2);
        }
      }
      const clipped = clampSheetSource(img, sx, sy, sw, sh);
      sx = clipped.sx;
      sy = clipped.sy;
      sw = clipped.sw;
      sh = clipped.sh;
      // 行シートの右端 1 列は隣コマ色が混ざることが多い。左は残して右だけ削る（左右対称 inset より欠け感が少ない）
      const trimEndX = Math.max(0, Math.floor(Number(S.sheetSourceTrimEndX != null ? S.sheetSourceTrimEndX : 0)));
      if (trimEndX > 0 && sw > trimEndX) {
        sw -= trimEndX;
        uW = Math.max(1, uW - trimEndX);
      }
      {
        const ox = Math.trunc(Number(S.sheetSourceOffsetX != null ? S.sheetSourceOffsetX : 0));
        const oy = Math.trunc(Number(S.sheetSourceOffsetY != null ? S.sheetSourceOffsetY : 0));
        if (ox !== 0) sx += ox;
        if (oy !== 0) sy += oy;
        if (ox !== 0 || oy !== 0) {
          const c2 = clampSheetSource(img, sx, sy, sw, sh);
          sx = c2.sx;
          sy = c2.sy;
          sw = c2.sw;
          sh = c2.sh;
        }
      }
      const dox = S.drawOffsetX;
      const doy = S.drawOffsetY;
      const sm = S.scaleMul != null ? Number(S.scaleMul) : null;
      const atlasExact = S.atlasSourceExact === true;
      // 等分割で列幅 42/43px が混在する場合、uW=列 max に合わせると輪郭が引き伸ばされて左右が欠けたように見える。sheetSourceUniformMax: false なら当該フレームの sw/sh で一様化（1px 横揺れの可能性あり）
      const useUniformMax = S.sheetSourceUniformMax !== false;
      const uCellW = useUniformMax ? uW : sw;
      const uCellH = useUniformMax ? uH : sh;
      const r = {
        ...rect,
        vAlign: S.sheetVAlign != null && S.sheetVAlign !== '' ? S.sheetVAlign : 'bottom',
        // パーツの rect.fit（contain）よりシートの S.fit を優先。赤 24 コマは contain だと高さ基準で幅が数十 px になり「細い1本」になる
        fit: S.fit != null && S.fit !== '' ? S.fit : (rect.fit != null ? rect.fit : 'contain'),
        clip: S.clip === true || rect.clip === true,
        scaleMul: isFinite(sm) && sm > 0 ? sm : undefined,
        uniformSourceCell: { w: uCellW, h: uCellH },
        atlasSourceExact: atlasExact,
        drawOffsetX: dox != null && dox !== '' && isFinite(Number(dox)) ? Math.trunc(Number(dox)) : 0,
        drawOffsetY: doy != null && doy !== '' && isFinite(Number(doy)) ? Math.trunc(Number(doy)) : 0,
        sheetSmoothUpscale: S.sheetSmoothUpscale === true
      };
      drawSpriteFrameInRect(img, sx, sy, sw, sh, r);
    }

    function drawTitleCharRedSpriteSheet(rect) {
      drawTitleCharSpriteSheet(
        titleCharRedSheetImg,
        CONFIG.TITLE_CHAR_RED_SHEET,
        rect
      );

    function drawImageInRect(img, rect) {
      if (!img) return;
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      if (!iw || !ih) return;
      const { x, y, w, h } = rect;
      const fit = rect.fit || 'contain';
      const fstr = String(fit);
      const vAlign = rect.vAlign != null ? rect.vAlign : 'center';
      const scale = fstr === 'cover' ? Math.max(w / iw, h / ih) : Math.min(w / iw, h / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = x + (w - dw) / 2;
      let dy;
      if (vAlign === 'bottom') {
        dy = y + h - dh;
      } else if (vAlign === 'top') {
        dy = y;
      } else {
        dy = y + (h - dh) / 2;
      }
      drawImage9Int(img, 0, 0, iw, ih, dx, dy, dw, dh);
    }

    function getScaledGridRect() {
      const S = CONFIG.ASSET_SHEET;
      const g = S.gridRect;
      const img = assetSheetImg;
      if (!img || !img.naturalWidth) return g;
      const fx = img.naturalWidth / S.sheetW;
      const fy = img.naturalHeight / S.sheetH;
      return {
        x: Math.round(g.x * fx),
        y: Math.round(g.y * fy),
        w: Math.round(g.w * fx),
        h: Math.round(g.h * fy)
      };
    }

    function getSheetCellRect(col, row) {
      const S = CONFIG.ASSET_SHEET;
      const g = getScaledGridRect();
      const cols = S.cols;
      const rows = S.rows;
      const ins = S.cellInset || 0;
      const cw = Math.floor(g.w / cols);
      const ch = Math.floor(g.h / rows);
      let sx = g.x + col * cw;
      let sy = g.y + row * ch;
      let sw = col === cols - 1 ? g.x + g.w - sx : cw;
      let sh = row === rows - 1 ? g.y + g.h - sy : ch;
      if (ins > 0) {
        sx += ins;
        sy += ins;
        sw -= ins * 2;
        sh -= ins * 2;
      }
      return { sx, sy, sw, sh };
    }

    function drawSheetCellInRect(img, col, row, rect) {
      if (!img || !img.naturalWidth) return;
      let { sx, sy, sw, sh } = getSheetCellRect(col, row);
      const clipped = clampSheetSource(img, sx, sy, sw, sh);
      sx = clipped.sx;
      sy = clipped.sy;
      sw = clipped.sw;
      sh = clipped.sh;
      if (sw <= 0 || sh <= 0) return;
      const { x, y, w, h } = rect;
      const fit = rect.fit || 'contain';
      const fstr = String(fit || 'contain');
      const vAlign = rect.vAlign != null ? rect.vAlign : 'center';
      const scale = fstr === 'cover'
        ? Math.max(w / sw, h / sh)
        : Math.min(w / sw, h / sh);
      const dw = sw * scale;
      const dh = sh * scale;
      const dx = x + (w - dw) / 2;
      let dy;
      if (vAlign === 'bottom') {
        dy = y + h - dh;
      } else if (vAlign === 'top') {
        dy = y;
      } else {
        dy = y + (h - dh) / 2;
      }
      drawImage9Int(img, sx, sy, sw, sh, dx, dy, dw, dh);
    }

    function drawTiledSheetCell(img, col, row, destX, destY, destW, destH) {
      if (!img || !img.naturalWidth) return;
      let { sx, sy, sw, sh } = getSheetCellRect(col, row);
      const clipped = clampSheetSource(img, sx, sy, sw, sh);
      sx = clipped.sx;
      sy = clipped.sy;
      sw = clipped.sw;
      sh = clipped.sh;
      if (sw <= 0 || sh <= 0) return;
      const scale = CONFIG.ASSET_SHEET.tileScale != null ? CONFIG.ASSET_SHEET.tileScale : 1;
      const tw = sw * scale;
      const th = sh * scale;
      ctx.save();
      ctx.beginPath();
      ctx.rect(destX, destY, destW, destH);
      ctx.clip();
      for (let tx = 0; tx < destW + tw; tx += tw) {
        for (let ty = 0; ty < destH + th; ty += th) {
          drawImage9Int(img, sx, sy, sw, sh, destX + tx, destY + ty, tw, th);
        }
      }
      ctx.restore();
    }

    // サウンド機能

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let lastPaintSoundTime = 0;

    /** @param {string} type */
    function playSound(type) {
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'paint') {
          const nowTs = Date.now();
          if (nowTs - lastPaintSoundTime < 60) return;
          lastPaintSoundTime = nowTs;
          osc.type = 'square';
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
          osc.start(now);
          osc.stop(now + 0.05);
        } else if (type === 'flag') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
          osc.start(now);
          osc.stop(now + 0.05);
        } else if (type === 'close') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.setValueAtTime(880, now + 0.1);
          osc.frequency.setValueAtTime(1320, now + 0.2);
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
        } else if (type === 'select') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(600, now);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
        } else if (type === 'countdown') {
          const hz = 1000;
          osc.type = 'square';
          osc.frequency.setValueAtTime(hz, now);
          gain.gain.setValueAtTime(0.11, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.048);
          osc.start(now);
          osc.stop(now + 0.052);
        } else if (type === 'countdownGo') {
          const hz = 1000;
          osc.type = 'square';
          osc.frequency.setValueAtTime(hz, now);
          gain.gain.setValueAtTime(0.11, now);
          gain.gain.setValueAtTime(0.1, now + 0.06);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.52);
          osc.start(now);
          osc.stop(now + 0.55);
        } else if (type === 'finish') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(880, now);
          osc.frequency.linearRampToValueAtTime(440, now + 0.5);
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.linearRampToValueAtTime(0.01, now + 1.0);
          osc.start(now);
          osc.stop(now + 1.0);
        }
      } catch (e) {
        console.warn('[RUBYFIGHT] playSound failed (continuing without audio)', e);
      }
    }

    /** 陣地確定：チャリ×3＋伸びる「ーン」（Web Audio。linearRamp のみで各ブラウザで鳴りやすく） */
    function playSoundTerritoryRubyWave(playerId) {
      try {
        if (audioCtx.state === 'suspended') {
          const p = audioCtx.resume();
          if (p && typeof p.then === 'function') p.catch(function () {});
        }
        let t = audioCtx.currentTime + 0.08;
        const isP1 = playerId === 1;
        const chirpBase = isP1 ? 1050 : 1180;
        for (let k = 0; k < 3; k++) {
          const f0 = chirpBase + k * 220;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = 'triangle';
          o.frequency.setValueAtTime(f0, t);
          o.frequency.linearRampToValueAtTime(f0 + 80, t + 0.06);
          g.gain.setValueAtTime(0.001, t);
          g.gain.linearRampToValueAtTime(0.16, t + 0.015);
          g.gain.linearRampToValueAtTime(0.001, t + 0.12);
          o.connect(g);
          g.connect(audioCtx.destination);
          o.start(t);
          o.stop(t + 0.13);
          const oHi = audioCtx.createOscillator();
          const gHi = audioCtx.createGain();
          oHi.type = 'sine';
          oHi.frequency.setValueAtTime(f0 * 2.02, t);
          gHi.gain.setValueAtTime(0.001, t);
          gHi.gain.linearRampToValueAtTime(0.045, t + 0.012);
          gHi.gain.linearRampToValueAtTime(0.001, t + 0.1);
          oHi.connect(gHi);
          gHi.connect(audioCtx.destination);
          oHi.start(t);
          oHi.stop(t + 0.11);
          t += 0.072;
        }
        const tLong = t + 0.04;
        const o2 = audioCtx.createOscillator();
        const g2 = audioCtx.createGain();
        o2.type = 'triangle';
        o2.frequency.setValueAtTime(isP1 ? 540 : 600, tLong);
        o2.frequency.linearRampToValueAtTime(isP1 ? 360 : 400, tLong + 0.38);
        g2.gain.setValueAtTime(0.001, tLong);
        g2.gain.linearRampToValueAtTime(0.14, tLong + 0.05);
        g2.gain.linearRampToValueAtTime(0.001, tLong + 0.5);
        o2.connect(g2);
        g2.connect(audioCtx.destination);
        o2.start(tLong);
        o2.stop(tLong + 0.52);
      } catch (e) {
        console.warn('[RUBYFIGHT] playSoundTerritoryRubyWave failed', e);
      }
    }

    /** ルビーバウンス：ふわっと溜めて弾け、小さな余韻（気持ちよさ寄り） */
    function rubyBounceJuice(u) {
      if (u <= 0) return { lift: 0, squash: 1 };
      if (u >= 1) return { lift: 0, squash: 1 };
      const up = 1 - Math.pow(1 - u, 2.6);
      const main = Math.sin(Math.PI * up);
      const ping = 0.22 * Math.sin(Math.PI * 7 * u) * (1 - u) * (1 - u);
      const lift = Math.max(0, main + ping);
      const squash = 1 + 0.2 * main * main - 0.06 * Math.sin(Math.PI * u);
      return { lift, squash };
    }

    const RUBY_SETTLE_STEP_MS = 9;
    const RUBY_BOUNCE_DURATION_MS = 260;
    const RUBY_BOUNCE_AMP_PX = 17;

    function scheduleTerritoryRubyWave(playerId, changedCells) {
      if (!changedCells || changedCells.length === 0) return;
      const nowMs = Date.now();
      const tWave0 = nowMs;
      let mx = 0;
      let my = 0;
      for (let i = 0; i < changedCells.length; i++) {
        mx += changedCells[i].gx;
        my += changedCells[i].gy;
      }
      mx /= changedCells.length;
      my /= changedCells.length;
      changedCells.sort(function (a, b) {
        const da = Math.hypot(a.gx - mx, a.gy - my);
        const db = Math.hypot(b.gx - mx, b.gy - my);
        if (Math.abs(da - db) > 0.0001) return da - db;
        return a.gx + a.gy - (b.gx + b.gy);
      });
      for (let i = 0; i < changedCells.length; i++) {
        const c = changedCells[i];
        if (c.gy >= 0 && c.gy < CONFIG.GRID_ROWS && c.gx >= 0 && c.gx < CONFIG.GRID_COLS) {
          const newT0 = tWave0 + i * RUBY_SETTLE_STEP_MS;
          const existing = rubyBounceGrid[c.gy][c.gx];
          let t0 = newT0;
          if (existing &&
              nowMs >= existing.t0 &&
              nowMs < existing.t0 + RUBY_BOUNCE_DURATION_MS) {
            t0 = existing.t0;
          }
          rubyBounceGrid[c.gy][c.gx] = { t0: t0, owner: playerId };
        }
      }
      playSoundTerritoryRubyWave(playerId);
    }

    /** 1P 視点のリザルト短いジングル（Web Audio 直生成）。「finish」の直後 0.15s から鳴る */
    function playResultStingerP1() {
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const t0 = audioCtx.currentTime + 0.15;
        if (p1Score > p2Score) {
          const freqs = [523.25, 659.25, 783.99, 1046.5];
          for (let i = 0; i < freqs.length; i++) {
            const t = t0 + i * 0.11;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(freqs[i], t);
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.11, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0008, t + 0.18);
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start(t);
            o.stop(t + 0.2);
          }
        } else if (p1Score < p2Score) {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(360, t0);
          o.frequency.exponentialRampToValueAtTime(78, t0 + 1.15);
          g.gain.setValueAtTime(0, t0);
          g.gain.linearRampToValueAtTime(0.13, t0 + 0.04);
          g.gain.exponentialRampToValueAtTime(0.0008, t0 + 1.25);
          o.connect(g);
          g.connect(audioCtx.destination);
          o.start(t0);
          o.stop(t0 + 1.3);
          const o2 = audioCtx.createOscillator();
          const g2 = audioCtx.createGain();
          o2.type = 'sine';
          o2.frequency.setValueAtTime(350, t0);
          o2.frequency.exponentialRampToValueAtTime(70, t0 + 1.1);
          g2.gain.setValueAtTime(0, t0);
          g2.gain.linearRampToValueAtTime(0.05, t0 + 0.2);
          g2.gain.exponentialRampToValueAtTime(0.0008, t0 + 1.2);
          o2.connect(g2);
          g2.connect(audioCtx.destination);
          o2.start(t0);
          o2.stop(t0 + 1.3);
        } else {
          function blip(t, f0, f1) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(f0, t);
            o.frequency.exponentialRampToValueAtTime(f1, t + 0.2);
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.08, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0008, t + 0.35);
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start(t);
            o.stop(t + 0.4);
          }
          blip(t0, 330, 262);
          blip(t0 + 0.22, 262, 196);
        }
      } catch (e) {
        console.warn('[RUBYFIGHT] playResultStingerP1 failed (continuing without audio)', e);
      }
    }
