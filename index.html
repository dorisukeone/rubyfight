    // ==========================================
    // 入力処理（e.code が空の環境・IME 併用向けに e.key から補完）
    // ==========================================
    function keyEventToLogicalCode(e) {
      if (e.code) return e.code;
      if (e.key == null) return '';
      if (e.key.length === 1) {
        const k = e.key.toLowerCase();
        if (k === 'w') return 'KeyW';
        if (k === 's') return 'KeyS';
        if (k === 'a') return 'KeyA';
        if (k === 'd') return 'KeyD';
        if (k === 'f') return 'KeyF';
      }
      if (e.key === 'ArrowUp') return 'ArrowUp';
      if (e.key === 'ArrowDown') return 'ArrowDown';
      if (e.key === 'ArrowLeft') return 'ArrowLeft';
      if (e.key === 'ArrowRight') return 'ArrowRight';
      if (e.key === ' ' || e.key === 'Spacebar') return 'Space';
      if (e.key === 'Enter' || e.key === 'NumpadEnter') return 'Enter'; // 2P の旗も NumpadEnter で
      if (e.key === 'Escape') return 'Escape';
      return '';
    }

    window.addEventListener('keydown', (e) => {
      const code = keyEventToLogicalCode(e);
      if (code) {
        if (!keyState[code]) {
          handleKeyPress(code);
        }
        keyState[code] = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      const code = keyEventToLogicalCode(e);
      if (code) keyState[code] = false;
    });

    window.addEventListener('blur', () => {
      for (const k in keyState) {
        if (Object.prototype.hasOwnProperty.call(keyState, k)) {
          keyState[k] = false;
        }
      }
    });

    function toggleBrowserFullscreen() {
      const root = document.documentElement;
      if (!document.fullscreenElement) {
        root.requestFullscreen?.().catch(() => {});
      } else {
        document.exitFullscreen?.().catch(() => {});
      }
    }

    function handleKeyPress(code) {
      if (code === 'KeyF') {
        toggleBrowserFullscreen();
        return;
      }
      if (state === 'TITLE') {
        if (code === 'ArrowUp' || code === 'KeyW') {
          if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.gameStateMenuPrevIndex === 'function') {
            titleMenuIndex = window.RUBYFIGHT.gameStateMenuPrevIndex(titleMenuIndex, TITLE_MENU_ENTRY_COUNT);
          } else {
            titleMenuIndex =
              (titleMenuIndex + TITLE_MENU_ENTRY_COUNT - 1) % TITLE_MENU_ENTRY_COUNT;
          }
          playSound('select');
          return;
        }
        if (code === 'ArrowDown' || code === 'KeyS') {
          if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.gameStateMenuNextIndex === 'function') {
            titleMenuIndex = window.RUBYFIGHT.gameStateMenuNextIndex(titleMenuIndex, TITLE_MENU_ENTRY_COUNT);
          } else {
            titleMenuIndex = (titleMenuIndex + 1) % TITLE_MENU_ENTRY_COUNT;
          }
          playSound('select');
          return;
        }
        if (code === 'Space' || code === 'Enter') {
          if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.gameStateTitleConfirmAction === 'function') {
            const act = window.RUBYFIGHT.gameStateTitleConfirmAction(titleMenuIndex);
            if (act === 'vs_cpu') {
              mode = 1;
              startGame();
            } else if (act === 'vs_2p') {
              mode = 2;
              startGame();
            }
          } else {
            if (titleMenuIndex === 0) {
              mode = 1;
              startGame();
            } else if (titleMenuIndex === 1) {
              mode = 2;
              startGame();
            }
          }
        }
        return;
      }
      if (state === 'COUNTDOWN') {
        return;
      }
      if (state === 'PLAYING') {
        if (mode === 1) {
          if (code === 'Space' || code === 'Enter') placeFlag(p1, 1);
        } else {
          if (code === 'Space') placeFlag(p1, 1);
          if (code === 'Enter') placeFlag(p2, 2);
        }
      } else if (state === 'RESULT') {
        let canLeaveResult = false;
        if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.gameStateCanAdvanceFromResult === 'function') {
          canLeaveResult = window.RUBYFIGHT.gameStateCanAdvanceFromResult(Date.now(), stateStartTime);
        } else {
          canLeaveResult = Date.now() - stateStartTime > 2000;
        }
        if (canLeaveResult) {
          if (code === 'Space' || code === 'Enter') {
            playSound('select');
            state = 'TITLE';
            titleMenuIndex = 0;
          }
        }
      }
    }

    // ==========================================
    // ゲームロジック
    // ==========================================
    function startGame() {
      state = 'COUNTDOWN';
      countdownElapsed = 0;
      countdownLastFloor = -1;
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.sessionInitialTimeRemaining === 'function') {
        timeRemaining = window.RUBYFIGHT.sessionInitialTimeRemaining();
      } else {
        timeRemaining = CONFIG.GAME_TIME;
      }

      flags1 = [];
      flags2 = [];
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.sessionBootstrapGrids === 'function') {
        const pair = window.RUBYFIGHT.sessionBootstrapGrids();
        grid = pair[0];
        effectGrid = pair[1];
      } else {
        grid = [];
        effectGrid = [];
        for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
          grid[y] = [];
          effectGrid[y] = [];
          for (let x = 0; x < CONFIG.GRID_COLS; x++) {
            grid[y][x] = 0;
            effectGrid[y][x] = 0;
          }
        }
      }
      rubyBounceGrid = [];
      for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
        rubyBounceGrid[y] = [];
        for (let x = 0; x < CONFIG.GRID_COLS; x++) {
          rubyBounceGrid[y][x] = null;
        }
      }

      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.sessionP1Spawn === 'function') {
        const s1 = window.RUBYFIGHT.sessionP1Spawn();
        p1 = { x: s1[0], y: s1[1] };
      } else {
        p1 = { x: 8 * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, y: 8 * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
      }
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.sessionP2Spawn === 'function') {
        const s2 = window.RUBYFIGHT.sessionP2Spawn();
        p2 = { x: s2[0], y: s2[1] };
      } else {
        p2 = { x: 23 * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, y: 8 * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
      }
      p1Vis = { x: p1.x, y: p1.y };
      p2Vis = { x: p2.x, y: p2.y };

      cpuTarget = null;
      cpuWaitTimer = 0;

      p1WalkAccum = 0;
      p2WalkAccum = 0;
      p1WalkFrame = 0;
      p2WalkFrame = 0;
      p1FacingRight = true;
      p1LastPos = { x: p1.x, y: p1.y };
      p2LastPos = { x: p2.x, y: p2.y };

      calcScore();
      canvas.focus({ preventScroll: true });
    }

    function isValidPosition(px, py) {
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.layoutIsValidPosition === 'function') {
        return !!window.RUBYFIGHT.layoutIsValidPosition(px, py, FIELD_MASK);
      }
      const r = (CONFIG.PLAYER_SIZE / 2) - 2; 
      const points = [
        {x: px - r, y: py - r},
        {x: px + r, y: py - r},
        {x: px - r, y: py + r},
        {x: px + r, y: py + r}
      ];
      for (let pt of points) {
        const gx = Math.floor(pt.x / CONFIG.TILE_SIZE);
        const gy = Math.floor(pt.y / CONFIG.TILE_SIZE);
        if (gx < 0 || gx >= CONFIG.GRID_COLS || gy < 0 || gy >= CONFIG.GRID_ROWS) return false;
        if (FIELD_MASK[gy][gx] === ' ') return false;
      }
      return true;
    }

    /**
     * CPU ターゲット（lib/rubyfight/cpu.rb pick_target_center と同じ考え方）
     * P1 隣接・空隣接・P1 マス乗上・中心寄り。旗 2 本時は大きい三角形（塗り数）を最優先
     */
    function cpuHeurForCell(gx, gy, grid, maskRows) {
      const cols = CONFIG.GRID_COLS;
      const rows = CONFIG.GRID_ROWS;
      const c = grid[gy][gx];
      let p1n = 0;
      let p0n = 0;
      const d4 = [[-1, 0], [1, 0], [0, -1], [0, 1]];
      for (let i = 0; i < d4.length; i++) {
        const nx = gx + d4[i][0];
        const ny = gy + d4[i][1];
        if (nx < 0 || ny < 0 || nx >= cols || ny >= rows) continue;
        if (maskRows[ny][nx] === ' ') continue;
        if (grid[ny][nx] === 1) p1n++;
        if (grid[ny][nx] === 0) p0n++;
      }
      const t = CONFIG.TILE_SIZE;
      const cx = gx * t + t / 2;
      const cy = gy * t + t / 2;
      const cx0 = FIELD_WIDTH / 2;
      const cy0 = FIELD_HEIGHT / 2;
      const mxy = Math.max(FIELD_WIDTH, FIELD_HEIGHT) / 2;
      const cbonus = 1.0 - Math.min(Math.hypot(cx - cx0, cy - cy0) / mxy, 1.0);
      let s = 4.2 * p1n + 0.75 * p0n;
      if (c === 1) s += 1.35;
      if (c === 0) s += 0.55;
      s += 0.65 * cbonus;
      return s;
    }

    /** 旗 0〜1 本時のみ。旗 2 本の第 3 点は cpuPickTargetScoredJs 内で gain 最大化 */
    function cpuScoreForCandidate(gx, gy, grid, maskRows, flags2) {
      const h = cpuHeurForCell(gx, gy, grid, maskRows);
      if (!flags2 || flags2.length === 0) return h;
      const f = flags2[0];
      const span = Math.abs(gx - f.gx) + Math.abs(gy - f.gy);
      return 0.14 * span + 0.9 * h;
    }

    function cpuTieKeyGyGx(a, b) {
      for (let k = 0; k < a.length; k++) {
        if (a[k] !== b[k]) return a[k] < b[k] ? -1 : 1;
      }
      return 0;
    }

    /**
     * 旗 2 本: 塗りマス数 gain を常に最大 → 同点は h 最大 → 同点は (gy, gx) 最小
     * それ以外: 従来スコア最大 → 同点は (gy, gx) 最小（lib/rubyfight/cpu.rb と一致）
     */
    function cpuPickTargetScoredJs(grid, maskRows, flags2) {
      const t = CONFIG.TILE_SIZE;
      const two = flags2 && flags2.length === 2;
      const a = two ? flags2[0] : null;
      const b = two ? flags2[1] : null;
      const cands = [];
      for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
        for (let x = 0; x < CONFIG.GRID_COLS; x++) {
          if (maskRows[y][x] === ' ') continue;
          if (grid[y][x] === 2) continue;
          const tx = x * t + t / 2;
          const ty = y * t + t / 2;
          if (!isValidPosition(tx, ty)) continue;
          if (two) {
            const h = cpuHeurForCell(x, y, grid, maskRows);
            const gain = cpuSimulatedFillCount2(grid, maskRows, a.gx, a.gy, b.gx, b.gy, x, y);
            cands.push({ tx, ty, gx: x, gy: y, gain, h });
          } else {
            cands.push({ tx, ty, gx: x, gy: y, s: cpuScoreForCandidate(x, y, grid, maskRows, flags2) });
          }
        }
      }
      if (cands.length === 0) return null;
      if (two) {
        let gmax = -1;
        for (let i = 0; i < cands.length; i++) {
          if (cands[i].gain > gmax) gmax = cands[i].gain;
        }
        let t1 = cands.filter(function (c) { return c.gain === gmax; });
        let hmax = -1e9;
        for (let i = 0; i < t1.length; i++) {
          if (t1[i].h > hmax) hmax = t1[i].h;
        }
        t1 = t1.filter(function (c) { return c.h === hmax; });
        t1.sort(function (p, q) { return cpuTieKeyGyGx([p.gy, p.gx], [q.gy, q.gx]); });
        const pick0 = t1[0];
        return [pick0.tx, pick0.ty];
      }
      let best = -1e9;
      for (let i = 0; i < cands.length; i++) {
        if (cands[i].s > best) best = cands[i].s;
      }
      const t1 = cands.filter(function (c) { return c.s === best; });
      t1.sort(function (p, q) { return cpuTieKeyGyGx([p.gy, p.gx], [q.gy, q.gx]); });
      const pick = t1[0];
      return [pick.tx, pick.ty];
    }

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    /** @returns {number} 0 以上。CONFIG が欠ける・NaN なら 0 */
    function playerVisSmoothK() {
      const n = Number(CONFIG.PLAYER_VIS_SMOOTH);
      if (!isFinite(n) || n < 0) return 0;
      return n;
    }

    /** 追従オフ、または vis が壊れているときは sim を描画に使う */
    function playerDrawFor(sim, vis) {
      if (playerVisSmoothK() <= 0) return sim;
      if (vis && isFinite(vis.x) && isFinite(vis.y)) return vis;
      return sim;
    }

    /** シミュ座標 p1/p2 へ p1Vis/p2Vis を追従（描画のチラつき低減。ゲームルールの座標は不変） */
    function smoothPlayerDisplay(dt) {
      const k = playerVisSmoothK();
      if (k <= 0) {
        p1Vis.x = p1.x;
        p1Vis.y = p1.y;
        p2Vis.x = p2.x;
        p2Vis.y = p2.y;
        return;
      }
      const dtf = typeof dt === 'number' && isFinite(dt) && dt > 0 ? Math.min(dt, 0.25) : 1 / 60;
      function step(vis, tx, ty) {
        if (!isFinite(tx) || !isFinite(ty)) {
          return;
        }
        const dx = tx - vis.x;
        const dy = ty - vis.y;
        if (dx * dx + dy * dy > 400 * 400) {
          vis.x = tx;
          vis.y = ty;
          return;
        }
        const t = 1 - Math.exp(-k * dtf);
        vis.x += dx * t;
        vis.y += dy * t;
        if (!isFinite(vis.x) || !isFinite(vis.y)) {
          vis.x = tx;
          vis.y = ty;
        }
      }
      step(p1Vis, p1.x, p1.y);
      step(p2Vis, p2.x, p2.y);
    }

    function placeFlag(p, playerId) {
      let gx, gy;
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.layoutPixelToGrid === 'function') {
        const g = window.RUBYFIGHT.layoutPixelToGrid(p.x, p.y);
        gx = g[0];
        gy = g[1];
      } else {
        gx = Math.floor(p.x / CONFIG.TILE_SIZE);
        gy = Math.floor(p.y / CONFIG.TILE_SIZE);
      }

      if (gx < 0 || gx >= CONFIG.GRID_COLS || gy < 0 || gy >= CONFIG.GRID_ROWS) return;
      if (FIELD_MASK[gy][gx] === ' ') return;

      const flags = playerId === 1 ? flags1 : flags2;

      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.territoryPushFlag === 'function') {
        const pairs = flags.map(function (f) { return [f.gx, f.gy]; });
        const nextPairs = window.RUBYFIGHT.territoryPushFlag(pairs, gx, gy);
        if (nextPairs === null) return;
        flags.length = 0;
        for (let i = 0; i < nextPairs.length; i++) {
          flags.push({ gx: nextPairs[i][0], gy: nextPairs[i][1] });
        }
        if (flags.length === 3) {
          fillPolygon(playerId, flags);
          if (playerId === 1) flags1 = []; else flags2 = [];
          playSound('close');
        } else {
          playSound('flag');
        }
        return;
      }

      const existingIdx = flags.findIndex(f => f.gx === gx && f.gy === gy);
      if (existingIdx !== -1) {
        return;
      } else {
        flags.push({gx, gy});
        if (flags.length === 3) {
          fillPolygon(playerId, flags);
          if (playerId === 1) flags1 = []; else flags2 = [];
          playSound('close');
        } else {
          playSound('flag');
        }
      }
    }

    function fillPolygon(playerId, flags) {
      if (flags.length !== 3) return;

      const [p0, p1, p2] = flags;
      let filledCount = 0;

      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.territoryFillTriangle === 'function') {
        const gridBefore = grid.map(function (row) { return row.slice(); });
        filledCount = window.RUBYFIGHT.territoryFillTriangle(
          grid, playerId,
          p0.gx, p0.gy, p1.gx, p1.gy, p2.gx, p2.gy,
          FIELD_MASK
        );
        if (filledCount > 0) {
          const changedCells = [];
          for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
            for (let x = 0; x < CONFIG.GRID_COLS; x++) {
              if (grid[y][x] !== gridBefore[y][x]) {
                changedCells.push({ gx: x, gy: y });
              }
            }
          }
          scheduleTerritoryRubyWave(playerId, changedCells);
        }
      } else {
        const minX = Math.min(p0.gx, p1.gx, p2.gx);
        const maxX = Math.max(p0.gx, p1.gx, p2.gx);
        const minY = Math.min(p0.gy, p1.gy, p2.gy);
        const maxY = Math.max(p0.gy, p1.gy, p2.gy);
        const changedCells = [];
        for (let y = minY; y <= maxY; y++) {
          for (let x = minX; x <= maxX; x++) {
            if (FIELD_MASK[y] && FIELD_MASK[y][x] === ' ') continue;
            if (isPointInTriangle(x, y, p0.gx, p0.gy, p1.gx, p1.gy, p2.gx, p2.gy)) {
              if (grid[y][x] !== playerId) {
                grid[y][x] = playerId;
                changedCells.push({ gx: x, gy: y });
                filledCount++;
              }
            }
          }
        }
        if (filledCount > 0) {
          scheduleTerritoryRubyWave(playerId, changedCells);
        }
      }
      if (filledCount > 0) {
        calcScore();
      }
    }

    function isPointInTriangle(px, py, x0, y0, x1, y1, x2, y2) {
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.territoryPointInTriangle === 'function') {
        return !!window.RUBYFIGHT.territoryPointInTriangle(px, py, x0, y0, x1, y1, x2, y2);
      }
      const d = (y1 - y2) * (x0 - x2) + (x2 - x1) * (y0 - y2);
      if (d === 0) {
        return (px === x0 && py === y0) || (px === x1 && py === y1) || (px === x2 && py === y2);
      }
      const a = ((y1 - y2) * (px - x2) + (x2 - x1) * (py - y2)) / d;
      const b = ((y2 - y0) * (px - x2) + (x0 - x2) * (py - y2)) / d;
      const c = 1 - a - b;
      const eps = -0.01;
      return a >= eps && b >= eps && c >= eps;
    }

    /**
     * 第 3 点 (x2,y2) を加えたとき、playerId=2 で塗り替わるマス数（lib/rubyfight/territory simulated_fill_count に相当）
     */
    function cpuSimulatedFillCount2(grid, maskRows, x0, y0, x1, y1, x2, y2) {
      const playerId = 2;
      const minX = Math.min(x0, x1, x2);
      const maxX = Math.max(x0, x1, x2);
      const minY = Math.min(y0, y1, y2);
      const maxY = Math.max(y0, y1, y2);
      let filled = 0;
      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          if (!maskRows[y] || maskRows[y][x] === ' ') continue;
          if (!isPointInTriangle(x, y, x0, y0, x1, y1, x2, y2)) continue;
          if (grid[y][x] !== playerId) filled++;
        }
      }
      return filled;
    }

    function calcScore() {
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.territoryCalcScores === 'function') {
        const s = window.RUBYFIGHT.territoryCalcScores(grid, FIELD_MASK);
        p1Score = s[0];
        p2Score = s[1];
        return;
      }
      p1Score = 0;
      p2Score = 0;
      for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
        for (let x = 0; x < CONFIG.GRID_COLS; x++) {
          if (FIELD_MASK[y][x] === ' ') continue;
          if (grid[y][x] === 1) p1Score++;
          if (grid[y][x] === 2) p2Score++;
        }
      }
    }

    function update(dt) {
      if (state === 'COUNTDOWN') {
        const raw = CONFIG.PREPLAY_COUNTDOWN_SEC != null ? CONFIG.PREPLAY_COUNTDOWN_SEC : 3;
        const total = isFinite(Number(raw)) && Number(raw) > 0 ? Number(raw) : 3;
        countdownElapsed += dt;
        const f = Math.floor(countdownElapsed);
        if (f !== countdownLastFloor) {
          countdownLastFloor = f;
          if (f < total) playSound('countdown');
        }
        if (countdownElapsed >= total) {
          state = 'PLAYING';
          stateStartTime = Date.now();
          playSound('countdownGo');
        }
        return;
      }
      if (state === 'PLAYING') {
        if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.gameStateTickPlaying === 'function') {
          const tick = window.RUBYFIGHT.gameStateTickPlaying(timeRemaining, dt);
          timeRemaining = tick[0];
          if (tick[1]) {
            enterResultState();
            return;
          }
        } else {
          timeRemaining -= dt;
          if (timeRemaining <= 0) {
            timeRemaining = 0;
            enterResultState();
            return;
          }
        }

        let currentSpeed;
        if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.moveSpeedForTimeRemaining === 'function') {
          currentSpeed = window.RUBYFIGHT.moveSpeedForTimeRemaining(timeRemaining);
        } else {
          currentSpeed = timeRemaining <= CONFIG.RUSH_TIME
            ? CONFIG.BASE_SPEED * CONFIG.SPEED_UP_MULTIPLIER
            : CONFIG.BASE_SPEED;
        }
        // __rbNum 等で NaN/0 になると一切動かない
        if (!isFinite(currentSpeed) || currentSpeed <= 0) {
          currentSpeed = timeRemaining <= CONFIG.RUSH_TIME
            ? CONFIG.BASE_SPEED * CONFIG.SPEED_UP_MULTIPLIER
            : CONFIG.BASE_SPEED;
        }

        // P1の移動処理
        let dx1 = 0, dy1 = 0;
        if (keyState['KeyW'] || (mode === 1 && keyState['ArrowUp'])) dy1 -= 1;
        if (keyState['KeyS'] || (mode === 1 && keyState['ArrowDown'])) dy1 += 1;
        if (keyState['KeyA'] || (mode === 1 && keyState['ArrowLeft'])) dx1 -= 1;
        if (keyState['KeyD'] || (mode === 1 && keyState['ArrowRight'])) dx1 += 1;

        if (dx1 !== 0 || dy1 !== 0) {
          const len = Math.sqrt(dx1 * dx1 + dy1 * dy1);
          const nextX = p1.x + (dx1 / len) * currentSpeed * dt;
          const nextY = p1.y + (dy1 / len) * currentSpeed * dt;
          
          if (isValidPosition(nextX, p1.y)) p1.x = nextX;
          if (isValidPosition(p1.x, nextY)) p1.y = nextY;
        }

        // P2/CPUの移動処理
        if (mode === 2) {
          let dx2 = 0, dy2 = 0;
          if (keyState['ArrowUp']) dy2 -= 1;
          if (keyState['ArrowDown']) dy2 += 1;
          if (keyState['ArrowLeft']) dx2 -= 1;
          if (keyState['ArrowRight']) dx2 += 1;

          if (dx2 !== 0 || dy2 !== 0) {
            const len = Math.sqrt(dx2 * dx2 + dy2 * dy2);
            const nextX = p2.x + (dx2 / len) * currentSpeed * dt;
            const nextY = p2.y + (dy2 / len) * currentSpeed * dt;
            
            if (isValidPosition(nextX, p2.y)) p2.x = nextX;
            if (isValidPosition(p2.x, nextY)) p2.y = nextY;
          }
        } else if (mode === 1) {
          // ★ CPU制御ロジック
          if (cpuWaitTimer > 0) {
            cpuWaitTimer -= dt;
          } else {
            if (!cpuTarget) {
              const cpuFlagPairs = (flags2 && flags2.length) ? flags2.map(function (f) { return [f.gx, f.gy]; }) : null;
              if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.cpuPickTarget === 'function') {
                const t = window.RUBYFIGHT.cpuPickTarget(grid, FIELD_MASK, cpuFlagPairs);
                if (t) {
                  cpuTarget = { x: t[0], y: t[1] };
                }
              } else {
                const ts = cpuPickTargetScoredJs(grid, FIELD_MASK, flags2);
                if (ts) {
                  cpuTarget = { x: ts[0], y: ts[1] };
                }
              }
            }

            if (cpuTarget) {
              let dx2 = cpuTarget.x - p2.x;
              let dy2 = cpuTarget.y - p2.y;
              const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
              let cpuSpeed;
              if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.cpuMoveSpeedForTimeRemaining === 'function') {
                cpuSpeed = window.RUBYFIGHT.cpuMoveSpeedForTimeRemaining(timeRemaining);
              } else {
                cpuSpeed = currentSpeed * CONFIG.CPU_SPEED_MULTIPLIER;
              }
              if (!isFinite(cpuSpeed) || cpuSpeed <= 0) {
                cpuSpeed = currentSpeed * CONFIG.CPU_SPEED_MULTIPLIER;
              }

              let cpuArrived = false;
              if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.cpuReachedTarget === 'function') {
                cpuArrived = window.RUBYFIGHT.cpuReachedTarget(dist, cpuSpeed, dt);
              } else {
                cpuArrived = dist < cpuSpeed * dt || dist < 5;
              }
              if (cpuArrived) {
                p2.x = cpuTarget.x;
                p2.y = cpuTarget.y;
                placeFlag(p2, 2);
                cpuTarget = null;
                if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.cpuWaitAfterFlagSec === 'function') {
                  cpuWaitTimer = window.RUBYFIGHT.cpuWaitAfterFlagSec();
                } else {
                  cpuWaitTimer = 0.1 + Math.random() * 0.2;
                }
              } else {
                const nextX = p2.x + (dx2 / dist) * cpuSpeed * dt;
                const nextY = p2.y + (dy2 / dist) * cpuSpeed * dt;
                
                let movedX = false;
                let movedY = false;

                if (isValidPosition(nextX, p2.y)) {
                  p2.x = nextX;
                  movedX = true;
                }
                if (isValidPosition(p2.x, nextY)) {
                  p2.y = nextY;
                  movedY = true;
                }
                
                // ★ CPUが壁に引っかかって完全にスタックした場合はターゲットを取り直す
                if (!movedX && !movedY) {
                   cpuTarget = null;
                   if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.cpuWaitAfterStuckSec === 'function') {
                     cpuWaitTimer = window.RUBYFIGHT.cpuWaitAfterStuckSec();
                   } else {
                     cpuWaitTimer = 0.3;
                   }
                   if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.nudgeTowardFieldCenter === 'function') {
                     const np = window.RUBYFIGHT.nudgeTowardFieldCenter(p2.x, p2.y);
                     p2.x = np[0];
                     p2.y = np[1];
                   } else {
                     p2.x += (FIELD_WIDTH / 2 - p2.x) * 0.07;
                     p2.y += (FIELD_HEIGHT / 2 - p2.y) * 0.07;
                   }
                }
              }
            }
          }
        }

        smoothPlayerDisplay(dt);

        const p1d = playerDrawFor(p1, p1Vis);
        const rate1 = (CONFIG.PLAY_P1_SHEET && Number(CONFIG.PLAY_P1_SHEET.walkCyclesPerSec)) || 10;
        const v1x = p1d.x - p1LastPos.x;
        const v1y = p1d.y - p1LastPos.y;
        if (v1x * v1x + v1y * v1y > 0.15) {
          p1WalkAccum += dt * rate1;
          if (Math.abs(v1x) > Math.abs(v1y) * 0.45) {
            if (v1x > 0) p1FacingRight = true;
            else if (v1x < 0) p1FacingRight = false;
          }
        } else {
          p1WalkAccum = 0;
        }
        p1WalkFrame = Math.floor(p1WalkAccum) % 4;
        p1LastPos.x = p1d.x;
        p1LastPos.y = p1d.y;

        const p2d = playerDrawFor(p2, p2Vis);
        const rate2 = (CONFIG.PLAY_P2_SHEET && Number(CONFIG.PLAY_P2_SHEET.walkCyclesPerSec)) || rate1;
        const v2x = p2d.x - p2LastPos.x;
        const v2y = p2d.y - p2LastPos.y;
        if (v2x * v2x + v2y * v2y > 0.15) {
          p2WalkAccum += dt * rate2;
        } else {
          p2WalkAccum = 0;
        }
        p2WalkFrame = Math.floor(p2WalkAccum) % 4;
        p2LastPos.x = p2d.x;
        p2LastPos.y = p2d.y;
      }
    }

    // ==========================================
    // 描画処理
    // ==========================================
    function draw() {
      ctx.fillStyle = CONFIG.COLORS.bg;
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

      if (state === 'TITLE') {
        drawTitle();
      } else if (state === 'PLAYING' || state === 'RESULT' || state === 'COUNTDOWN') {
        drawPlayBackdrop();
        drawField();
        drawUI();
        if (state === 'COUNTDOWN') drawPreplayCountdownOverlay();
        if (state === 'RESULT') drawResult();
      }
    }

    /** 試合開始前：3→2→1 を中央に重ね表示 */
    function drawPreplayCountdownOverlay() {
      const raw = CONFIG.PREPLAY_COUNTDOWN_SEC != null ? CONFIG.PREPLAY_COUNTDOWN_SEC : 3;
      const total = isFinite(Number(raw)) && Number(raw) > 0 ? Number(raw) : 3;
      const n = Math.ceil(total - countdownElapsed);
      if (n <= 0) return;
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.52)';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      ctx.fillStyle = CONFIG.COLORS.hudGold;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '120px "Press Start 2P", monospace';
      ctx.fillText(String(n), CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2);
      ctx.restore();
    }

    /** プレイ中：共通背景＋ビネット（フィールドは drawField / HUD は drawUI） */
    function drawPlayBackdrop() {
      const full = {
        x: 0,
        y: 0,
        w: CONFIG.WIDTH,
        h: CONFIG.HEIGHT,
        fit: 'cover'
      };
      if (playScreenBgImg && playScreenBgImg.naturalWidth > 0) {
        drawImageInRect(playScreenBgImg, full);
        drawBackdropVignette(0.06);
      } else if (assetSheetImg && assetSheetImg.naturalWidth > 0) {
        const [bc, br] = sheetCellPair('backgroundPattern');
        drawTiledSheetCell(
          assetSheetImg,
          bc,
          br,
          0,
          0,
          CONFIG.WIDTH,
          CONFIG.HEIGHT
        );
        drawBackdropVignette(0.2);
      } else {
        drawRubyPatternBackdrop();
        drawBackdropVignette(0.22);
      }
    }

    /** 画像未読込時のルビー風ドット＋回路風ライン */
    function drawRubyPatternBackdrop() {
      ctx.save();
      ctx.fillStyle = '#1a0a0a';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      const seed = 7;
      for (let y = 0; y < CONFIG.HEIGHT; y += 24) {
        for (let x = 0; x < CONFIG.WIDTH; x += 24) {
          const v = ((x * 13 + y * 17 + seed) % 37) / 37;
          if (v > 0.72) {
            ctx.fillStyle = 'rgba(180, 40, 55, 0.12)';
            ctx.fillRect(x + 8, y + 6, 6, 8);
            ctx.fillRect(x + 9, y + 5, 4, 10);
          }
        }
      }
      ctx.strokeStyle = 'rgba(80, 30, 40, 0.15)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 12; i++) {
        const y = (i * 47 + 20) % CONFIG.HEIGHT;
        ctx.beginPath();
        ctx.moveTo(0, y);
        for (let x = 0; x < CONFIG.WIDTH; x += 40) {
          ctx.lineTo(x, y + (i % 2 === 0 ? 3 : -3));
        }
        ctx.stroke();
      }
      ctx.restore();
    }

    /**
     * 陣地ルビー：参照スプライト同様「上が平らなテーブル・左右ガードルで最幅・下にキュレット」の5角＋カット面。
     * （タイトルの drawMiniRuby は6角のまま）
     */
    function territoryBrilliantPentagonMetrics(cx, cy, s) {
      return {
        wTop: s * 0.52,
        wGirdle: s * 0.92,
        yT: cy - s * 0.7,
        yG: cy + s * 0.05,
        yB: cy + s * 0.76
      };
    }

    /** m を渡すと metrics の再計算を省略（描画ループ用） */
    function appendTerritoryBrilliantPentagonPath(ctx, cx, cy, s, m) {
      const met = m || territoryBrilliantPentagonMetrics(cx, cy, s);
      ctx.beginPath();
      ctx.moveTo(cx - met.wTop, met.yT);
      ctx.lineTo(cx + met.wTop, met.yT);
      ctx.lineTo(cx + met.wGirdle, met.yG);
      ctx.lineTo(cx, met.yB);
      ctx.lineTo(cx - met.wGirdle, met.yG);
      ctx.closePath();
    }

    function drawTerritoryRubyCell(px, py, ts, owner, bounceDy, bounceScale) {
      const dy = bounceDy != null ? bounceDy : 0;
      const sc = bounceScale != null ? bounceScale : 1;
      const cx = px + ts * 0.5;
      const cy = py + ts * 0.5;
      const isP1 = owner === 1;
      const isP2 = owner === 2;
      const s = ts * 0.41;
      const m = territoryBrilliantPentagonMetrics(cx, cy, s);

      ctx.save();
      ctx.translate(cx, cy + dy);
      ctx.scale(sc, sc);
      ctx.translate(-cx, -cy);

      const g = ctx.createRadialGradient(
        cx - ts * 0.2,
        cy - ts * 0.32,
        ts * 0.03,
        cx + ts * 0.06,
        cy + ts * 0.12,
        ts * 0.55
      );
      if (isP1) {
        g.addColorStop(0, '#fff2f2');
        g.addColorStop(0.15, '#ff7a82');
        g.addColorStop(0.38, '#d82038');
        g.addColorStop(0.62, '#781018');
        g.addColorStop(0.88, '#400810');
        g.addColorStop(1, '#180204');
      } else if (isP2) {
        g.addColorStop(0, '#f2f8ff');
        g.addColorStop(0.15, '#78b8ff');
        g.addColorStop(0.38, '#2868d8');
        g.addColorStop(0.62, '#103878');
        g.addColorStop(0.88, '#081c40');
        g.addColorStop(1, '#040c18');
      } else {
        g.addColorStop(0, '#f4f2f8');
        g.addColorStop(0.2, '#a898b8');
        g.addColorStop(0.45, '#605870');
        g.addColorStop(0.72, '#383040');
        g.addColorStop(1, '#18141c');
      }

      appendTerritoryBrilliantPentagonPath(ctx, cx, cy, s, m);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = isP1 ? 'rgba(12,0,4,0.65)' : isP2 ? 'rgba(0,8,20,0.65)' : 'rgba(16,12,24,0.65)';
      ctx.lineWidth = 1.15;
      ctx.stroke();

      const yTbl = m.yT + s * 0.15;
      const xTL = cx - m.wTop * 0.72;
      const xTR = cx + m.wTop * 0.72;
      const xGL = cx - m.wGirdle;
      const xGR = cx + m.wGirdle;
      const facetHi = isP1 ? 'rgba(255,236,240,0.62)' : isP2 ? 'rgba(226,244,255,0.58)' : 'rgba(232,230,240,0.58)';
      const facetLo = isP1 ? 'rgba(48,4,12,0.45)' : isP2 ? 'rgba(4,24,56,0.45)' : 'rgba(28,24,40,0.45)';

      ctx.lineWidth = 0.85;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.strokeStyle = facetHi;
      ctx.moveTo(xTL, yTbl);
      ctx.lineTo(xTR, yTbl);
      ctx.moveTo(xTL, yTbl);
      ctx.lineTo(xGL, m.yG);
      ctx.moveTo(xTR, yTbl);
      ctx.lineTo(xGR, m.yG);
      ctx.stroke();
      ctx.beginPath();
      ctx.strokeStyle = facetLo;
      ctx.moveTo(xGL, m.yG);
      ctx.lineTo(cx, yTbl);
      ctx.moveTo(xGR, m.yG);
      ctx.lineTo(cx, yTbl);
      ctx.moveTo(cx, m.yB);
      ctx.lineTo(cx, yTbl);
      ctx.stroke();
      ctx.beginPath();
      ctx.strokeStyle = facetLo;
      ctx.moveTo(xGL, m.yG);
      ctx.lineTo(cx, m.yB);
      ctx.moveTo(xGR, m.yG);
      ctx.lineTo(cx, m.yB);
      ctx.stroke();

      ctx.save();
      appendTerritoryBrilliantPentagonPath(ctx, cx, cy, s, m);
      ctx.clip();
      const glint = ctx.createLinearGradient(cx - s * 1.1, m.yT - s * 0.2, cx + s * 0.5, cy + s * 0.5);
      glint.addColorStop(0, 'rgba(255,255,255,0.38)');
      glint.addColorStop(0.35, 'rgba(255,255,255,0.06)');
      glint.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = glint;
      ctx.fillRect(cx - s * 1.2, m.yT - s * 0.3, s * 2.4, s * 1.35);
      ctx.fillStyle = isP1 ? 'rgba(255,252,252,0.92)' : isP2 ? 'rgba(248,252,255,0.9)' : 'rgba(250,248,255,0.88)';
      ctx.fillRect(cx - m.wTop * 0.95, m.yT + s * 0.04, s * 0.11, s * 0.065);
      ctx.restore();

      ctx.restore();
    }

    /**
     * スペースで置いた旗の位置をポール＋布のフラッグで表示。playerId 1 / 2
     */
    function drawFlags(flags, playerId) {
      if (flags.length === 0) return;
      const isP1 = playerId === 1;
      const pole = isP1 ? '#3d1818' : '#182838';
      const fabric = isP1 ? CONFIG.COLORS.p1.tile : CONFIG.COLORS.p2.tile;
      const fabricEdge = isP1 ? '#8c2028' : '#204878';
      const chain = isP1 ? 'rgba(230, 92, 92, 0.5)' : 'rgba(110, 162, 228, 0.5)';

      ctx.save();
      ctx.setLineDash([3, 4]);
      ctx.strokeStyle = chain;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i < flags.length; i++) {
        const cx = flags[i].gx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
        const cy = flags[i].gy * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
        if (i === 0) ctx.moveTo(cx, cy);
        else ctx.lineTo(cx, cy);
      }
      ctx.stroke();
      ctx.setLineDash([]);

      const ts = CONFIG.TILE_SIZE;
      const poleTopOff = -Math.max(9, ts * 0.42);
      const poleBotOff = Math.max(7, ts * 0.32);
      const flagW = Math.max(11, ts * 0.55);
      const flagH = Math.max(8, ts * 0.38);

      for (let i = 0; i < flags.length; i++) {
        const cx = flags[i].gx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
        const cy = flags[i].gy * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
        const topY = cy + poleTopOff;
        const botY = cy + poleBotOff;

        ctx.strokeStyle = pole;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cx, botY);
        ctx.lineTo(cx, topY);
        ctx.stroke();

        const sign = isP1 ? 1 : -1;
        const fx0 = cx + sign * 1.5;
        const fy0 = topY;
        ctx.fillStyle = fabric;
        ctx.beginPath();
        ctx.moveTo(fx0, fy0);
        ctx.lineTo(fx0 + sign * flagW, fy0 + flagH * 0.48);
        ctx.lineTo(fx0, fy0 + flagH);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = fabricEdge;
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,255,0.28)';
        ctx.beginPath();
        ctx.moveTo(fx0 + sign * 2, fy0 + 1.5);
        ctx.lineTo(fx0 + sign * flagW * 0.55, fy0 + flagH * 0.45);
        ctx.lineTo(fx0 + sign * 2, fy0 + flagH - 1.5);
        ctx.closePath();
        ctx.fill();
      }

      const sx = flags[0].gx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
      const sy = flags[0].gy * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
      ctx.strokeStyle = CONFIG.COLORS.highlight;
      ctx.lineWidth = 1.2;
      ctx.strokeRect(sx - ts * 0.42, sy + poleTopOff - 2, ts * 0.84, poleBotOff - poleTopOff + 4);
      ctx.restore();
    }

    function drawField() {
      ctx.save();
      ctx.translate(OFFSET_X, OFFSET_Y);

      if (state === 'RESULT' && playerVisSmoothK() > 0) {
        p1Vis.x = p1.x;
        p1Vis.y = p1.y;
        p2Vis.x = p2.x;
        p2Vis.y = p2.y;
      }

      const now = Date.now();

      // タイル描画（背景ロゴ処理を削除し、色塗りつぶしのみに変更）
      for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
        for (let x = 0; x < CONFIG.GRID_COLS; x++) {
          if (FIELD_MASK[y][x] === ' ') continue;

          const owner = grid[y][x];
          const px = x * CONFIG.TILE_SIZE;
          const py = y * CONFIG.TILE_SIZE;

          if (owner === 0) {
            ctx.fillStyle = CONFIG.COLORS.fieldBg;
            ctx.fillRect(px, py, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            ctx.strokeRect(px, py, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
          } else {
            let bounceDy = 0;
            let bounceSc = 1;
            const rb = rubyBounceGrid[y] && rubyBounceGrid[y][x];
            if (rb) {
              if (now < rb.t0) {
                bounceDy = 0;
                bounceSc = 1;
              } else if (now < rb.t0 + RUBY_BOUNCE_DURATION_MS) {
                const u = (now - rb.t0) / RUBY_BOUNCE_DURATION_MS;
                const j = rubyBounceJuice(u);
                bounceDy = -RUBY_BOUNCE_AMP_PX * j.lift;
                bounceSc = j.squash;
              } else {
                rubyBounceGrid[y][x] = null;
              }
            }
            drawTerritoryRubyCell(px, py, CONFIG.TILE_SIZE, owner, bounceDy, bounceSc);
          }

          if (effectGrid[y][x]) {
            const elapsed = now - effectGrid[y][x];
            if (elapsed < 100) {
              const scale = 1.2 - (elapsed / 100) * 0.2;
              const size = CONFIG.TILE_SIZE * scale;
              const offset = (CONFIG.TILE_SIZE - size) / 2;
              ctx.fillStyle = CONFIG.COLORS.highlight;
              ctx.fillRect(px + offset, py + offset, size, size);
            } else {
              effectGrid[y][x] = 0;
            }
          }
        }
      }

      // ルビー型（マスクの境界）に沿って外枠線を描画
      ctx.strokeStyle = CONFIG.COLORS.ui;
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let y = 0; y < CONFIG.GRID_ROWS; y++) {
        for (let x = 0; x < CONFIG.GRID_COLS; x++) {
          if (FIELD_MASK[y][x] === ' ') continue;
          
          const px = x * CONFIG.TILE_SIZE;
          const py = y * CONFIG.TILE_SIZE;
          
          if (y === 0 || FIELD_MASK[y-1][x] === ' ') {
            ctx.moveTo(px, py); ctx.lineTo(px + CONFIG.TILE_SIZE, py);
          }
          if (y === CONFIG.GRID_ROWS - 1 || FIELD_MASK[y+1][x] === ' ') {
            ctx.moveTo(px, py + CONFIG.TILE_SIZE); ctx.lineTo(px + CONFIG.TILE_SIZE, py + CONFIG.TILE_SIZE);
          }
          if (x === 0 || FIELD_MASK[y][x-1] === ' ') {
            ctx.moveTo(px, py); ctx.lineTo(px, py + CONFIG.TILE_SIZE);
          }
          if (x === CONFIG.GRID_COLS - 1 || FIELD_MASK[y][x+1] === ' ') {
            ctx.moveTo(px + CONFIG.TILE_SIZE, py); ctx.lineTo(px + CONFIG.TILE_SIZE, py + CONFIG.TILE_SIZE);
          }
        }
      }
      ctx.stroke();

      drawFlags(flags1, 1);
      drawFlags(flags2, 2);

      drawPlayer(playerDrawFor(p1, p1Vis), CONFIG.COLORS.p1.player, false, p1WalkFrame);
      drawPlayer(playerDrawFor(p2, p2Vis), CONFIG.COLORS.p2.player, true, p2WalkFrame);

      ctx.restore();
    }

    function drawPlayPlayerSheet(p, img, S, isP2, walkFrame) {
      if (!img || !S) return;
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      if (!iw || !ih) return;
      const cols = Math.max(1, Math.floor(Number(S.cols)) || 4);
      const rows = Math.max(1, Math.floor(Number(S.rows)) || 1);
      const total = cols * rows;
      const fi = Math.max(0, Math.min(total - 1, Math.floor(Number(walkFrame)) || 0));
      const layout = (S.frameLayout != null && S.frameLayout !== '') ? String(S.frameLayout) : 'row';
      const { sx, sy, sw, sh } = getUniformSpriteFrameRect(iw, ih, cols, rows, fi, layout, false);
      if (sw <= 0 || sh <= 0) return;
      const boxW = CONFIG.PLAYER_SIZE * 1.75;
      const boxH = CONFIG.PLAYER_SIZE * 1.85;
      const scale = Math.min(boxW / sw, boxH / sh);
      const dw = sw * scale;
      const dh = sh * scale;
      ctx.save();
      ctx.translate(p.x, p.y);
      if (isP2) ctx.scale(-1, 1);
      const dx = -dw / 2;
      const dy = -dh / 2;
      drawImage9Int(img, sx, sy, sw, sh, dx, dy, dw, dh);
      ctx.restore();
    }

    function drawPlayer(p, color, isP2, walkFrame) {
      const wf = walkFrame != null ? walkFrame : 0;
      const S1 = CONFIG.PLAY_P1_SHEET;
      const p1SheetsReady = S1 && playP1SheetImgLeft && playP1SheetImgRight &&
        (S1.urlLeft && S1.urlRight || S1.url);
      if (!isP2 && p1SheetsReady) {
        const img = p1FacingRight ? playP1SheetImgRight : playP1SheetImgLeft;
        drawPlayPlayerSheet(p, img, S1, false, wf);
        return;
      }
      if (isP2 && playP2SheetImg && CONFIG.PLAY_P2_SHEET && CONFIG.PLAY_P2_SHEET.url) {
        drawPlayPlayerSheet(p, playP2SheetImg, CONFIG.PLAY_P2_SHEET, true, wf);
        return;
      }

      const pixelSize = 1.2; 
      const w = 32 * pixelSize; 
      const h = 30 * pixelSize; 
      
      ctx.save();
      ctx.translate(p.x, p.y);

      if (isP2) {
        ctx.scale(-1, 1);
      }

      ctx.translate(-w / 2, -h / 2);

      for (let y = 0; y < PLAYER_SPRITE.length; y++) {
        const row = PLAYER_SPRITE[y];
        for (let x = 0; x < row.length; x++) {
          const char = row[x];
          if (char === ' ') continue;
          
          let fillCol = color;
          let overlayCol = null;

          if (char === '0') { fillCol = '#1f1f2e'; } 
          else if (char === '1') { fillCol = color; overlayCol = 'rgba(0, 0, 0, 0.35)'; } 
          else if (char === '2') { fillCol = color; } 
          else if (char === '3') { fillCol = color; overlayCol = 'rgba(255, 255, 255, 0.4)'; } 
          else if (char === '4') { fillCol = '#ffffff'; } 
          else if (char === '5') { fillCol = '#2a2a35'; } 
          else if (char === '6') { fillCol = '#2a2a35'; } 
          else if (char === '7') { fillCol = '#e65c5c'; } 
          
          ctx.fillStyle = fillCol;
          ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
          
          if (overlayCol) {
            ctx.fillStyle = overlayCol;
            ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
          }
        }
      }
      
      ctx.restore();
    }

    function drawUI() {
      ctx.textBaseline = 'middle';
      const gold = CONFIG.COLORS.hudGold;

      ctx.textAlign = 'left';
      ctx.font = '17px "Press Start 2P", monospace';
      ctx.fillStyle = CONFIG.COLORS.p1.tile;
      ctx.fillText(`P1:${p1Score.toString().padStart(3, '0')}`, 14, 48);

      ctx.textAlign = 'right';
      ctx.fillStyle = CONFIG.COLORS.p2.tile;
      const p2Label = mode === 1 ? 'CPU' : 'P2';
      ctx.fillText(`${p2Label}:${p2Score.toString().padStart(3, '0')}`, CONFIG.WIDTH - 14, 48);

      let timerColor = gold;
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.rushHudBlinkPrimary === 'function') {
        if (window.RUBYFIGHT.rushHudBlinkPrimary(timeRemaining, Date.now())) {
          timerColor = CONFIG.COLORS.p1.tile;
        }
      } else if (timeRemaining <= CONFIG.RUSH_TIME && Math.floor(Date.now() / 100) % 2 === 0) {
        timerColor = CONFIG.COLORS.p1.tile;
      }
      ctx.textAlign = 'center';
      ctx.font = '38px "Press Start 2P", monospace';
      ctx.fillStyle = '#000000';
      ctx.fillText(Math.ceil(timeRemaining).toString().padStart(2, '0'), CONFIG.WIDTH / 2 + 2, 52);
      ctx.fillStyle = timerColor;
      ctx.fillText(Math.ceil(timeRemaining).toString().padStart(2, '0'), CONFIG.WIDTH / 2, 50);
    }

    function drawTitleMenuAndFooter() {
      const L = UI_LAYOUT.title;
      const labels = ['1P VS CPU', '1P VS 2P'];
      const cx = CONFIG.WIDTH / 2;
      const menuFooterMink = '#e8c6c0';
      ctx.textBaseline = 'middle';
      ctx.font = '18px "Press Start 2P", monospace';
      const row0 = L.menu.y + 40;
      const rowGap = 28;
      for (let i = 0; i < labels.length; i++) {
        const y = row0 + i * rowGap;
        const label = labels[i];
        const tw = ctx.measureText(label).width;
        ctx.textAlign = 'center';
        ctx.fillStyle = menuFooterMink;
        ctx.fillText(label, cx, y);
        if (titleMenuIndex === i) {
          ctx.textAlign = 'right';
          ctx.fillStyle = menuFooterMink;
          ctx.fillText('>', cx - tw / 2 - 14, y);
        }
      }

      ctx.fillStyle = menuFooterMink;
      ctx.textAlign = 'center';
      ctx.font = '11px "Press Start 2P", monospace';
      ctx.fillText('CONTROLS: P1 - WASD / SPACE, P2 - ARROWS / ENTER', CONFIG.WIDTH / 2, L.footerControlsY);
      ctx.fillText('F: BROWSER FULLSCREEN', CONFIG.WIDTH / 2, L.footerFullscreenY);
    }

    function drawTitle() {
      ctx.fillStyle = CONFIG.COLORS.bg;
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      const L = UI_LAYOUT.title;
      const P = L.parts;
      const sheetOk = !!(assetSheetImg && assetSheetImg.naturalWidth > 0);
      const hasTitleBg = !!(titleScreenBgImg && titleScreenBgImg.naturalWidth > 0);

      if (hasTitleBg) {
        drawImageInRect(titleScreenBgImg, { ...P.background, fit: 'cover' });
        drawBackdropVignette(0.14);
      } else if (sheetOk) {
        const [bgc, bgr] = sheetCellPair('backgroundPattern');
        drawTiledSheetCell(assetSheetImg, bgc, bgr, 0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
        drawBackdropVignette(0.18);
      } else if (titlePartImages.background) {
        drawImageInRect(titlePartImages.background, P.background);
        drawBackdropVignette(0.24);
      } else {
        drawRubyPatternBackdrop();
        drawBackdropVignette(0.42);
      }

      // タイトル専用：背景を少し落ち着かせる（プレイ中の明るさは変えない）
      ctx.fillStyle = 'rgba(0, 0, 0, 0.48)';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

      const hasLogoPng = drawableSize(titlePartImages.logo).w > 0;
      if (hasLogoPng) {
        drawImageInRect(titlePartImages.logo, P.logo);
      } else if (sheetOk) {
        const [lgc, lgr] = sheetCellPair('logo');
        drawSheetCellInRect(assetSheetImg, lgc, lgr, P.logo);
      } else {
        drawTitleLogoBlock(L);
      }

      if (drawableSize(titleCharRedSheetImg).w > 0) {
        drawTitleCharRedSpriteSheet(P.charLeft);
      } else if (drawableSize(titlePartImages.charLeft).w > 0) {
        drawImageInRect(titlePartImages.charLeft, P.charLeft);
      } else if (sheetOk) {
        const [rc, rr] = sheetCellPair('charRed');
        drawSheetCellInRect(assetSheetImg, rc, rr, P.charLeft);
      } else {
        drawTitleMascotsLeftOnly(L);
      }

      if (drawableSize(titleCharBlueSheetImg).w > 0) {
        drawTitleCharBlueSpriteSheet(P.charRight);
      } else if (drawableSize(titlePartImages.charRight).w > 0) {
        drawImageInRect(titlePartImages.charRight, P.charRight);
      } else if (sheetOk) {
        const [bc, br] = sheetCellPair('charBlue');
        drawSheetCellInRect(assetSheetImg, bc, br, P.charRight);
      } else {
        drawTitleMascotsRightOnly(L);
      }

      drawTitleMenuAndFooter();
    }

    function drawResult() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

      ctx.textAlign = 'center';
      ctx.font = '48px "Press Start 2P", monospace';
      ctx.fillStyle = CONFIG.COLORS.ui;
      ctx.fillText("TIME UP!", CONFIG.WIDTH / 2, 180);

      ctx.font = '32px "Press Start 2P", monospace';
      let msg;
      let tone;
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.matchResultHeadline === 'function') {
        msg = window.RUBYFIGHT.matchResultHeadline(p1Score, p2Score, mode === 1);
        tone = window.RUBYFIGHT.matchResultTone
          ? window.RUBYFIGHT.matchResultTone(p1Score, p2Score)
          : null;
      } else {
        msg = '';
        tone = null;
      }
      if (!msg) {
        if (p1Score > p2Score) {
          msg = "P1 WINS!";
          tone = 'p1';
        } else if (p2Score > p1Score) {
          msg = mode === 1 ? "CPU WINS!" : "P2 WINS!";
          tone = 'p2';
        } else {
          msg = "DRAW!";
          tone = 'tie';
        }
      }
      if (tone === 'p1') {
        ctx.fillStyle = CONFIG.COLORS.p1.tile;
      } else if (tone === 'p2') {
        ctx.fillStyle = CONFIG.COLORS.p2.tile;
      } else {
        ctx.fillStyle = CONFIG.COLORS.ui;
      }
      ctx.fillText(msg, CONFIG.WIDTH / 2, 260);

      let canShowReturn = false;
      if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.gameStateCanAdvanceFromResult === 'function') {
        canShowReturn = window.RUBYFIGHT.gameStateCanAdvanceFromResult(Date.now(), stateStartTime);
      } else {
        canShowReturn = Date.now() - stateStartTime > 2000;
      }
      if (canShowReturn) {
        ctx.font = '16px "Press Start 2P", monospace';
        let blinkOn = true;
        if (window.RUBYFIGHT && window.RUBYFIGHT_SYNCED && typeof window.RUBYFIGHT.gameStateBlink500msPrimary === 'function') {
          blinkOn = window.RUBYFIGHT.gameStateBlink500msPrimary(Date.now());
        } else {
          blinkOn = Math.floor(Date.now() / 500) % 2 === 0;
        }
        ctx.fillStyle = blinkOn ? CONFIG.COLORS.ui : '#ffaaaa';
        ctx.fillText("PRESS SPACE TO RETURN", CONFIG.WIDTH / 2, 360);
      }
    }

    // ==========================================
    // メインループ
    // ==========================================
    function drawFatalErrorScreen() {
      ctx.save();
      ctx.fillStyle = '#1a0508';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      ctx.fillStyle = '#ff8888';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.font = '14px monospace';
      ctx.fillText('ゲームループでエラーが発生しました。コンソールを確認してください。', 24, 24);
      ctx.fillStyle = '#ffcccc';
      const msg =
        fatalLoopError && fatalLoopError.message ? fatalLoopError.message : String(fatalLoopError);
      let y = 52;
      const lines = String(msg).split('\n');
      for (let i = 0; i < lines.length && i < 8; i++) {
        ctx.fillText(lines[i].slice(0, 100), 24, y);
        y += 20;
      }
      ctx.restore();
    }

    function gameLoop(now) {
      if (fatalLoopError) {
        drawFatalErrorScreen();
        requestAnimationFrame(gameLoop);
        return;
      }
      const rawDt = (now - lastTime) / 1000;
      lastTime = now;
      // タブ復帰・デバッガー一時停止で rawDt が数秒以上になり、1 回で TIME UP になるのを防ぐ
      const dt = Math.min(Math.max(rawDt, 0), 0.1);
      try {
        update(dt);
        draw();
      } catch (e) {
        fatalLoopError = e;
        console.error('[RUBYFIGHT] main loop (update/draw) halted', e);
      }
      requestAnimationFrame(gameLoop);
    }

    (function verifyRubyCoreAligned() {
      try {
        if (window.RUBYFIGHT_CONFIG_JSON == null) {
          console.warn('[RUBYFIGHT] RUBYFIGHT_CONFIG_JSON missing — using FALLBACK_* (add build/rubyfight.js)');
          return;
        }
        if (!window.RUBYFIGHT_SYNCED) {
          console.warn('[RUBYFIGHT] Page data not synced to Ruby JSON — skip deep verify (see boot warnings)');
          return;
        }
        var rb = safeParseJsonMaybeOpal(window.RUBYFIGHT_CONFIG_JSON);
        if (!rb) {
          console.error('[RUBYFIGHT] verify: CONFIG JSON re-parse failed');
          return;
        }
        // BEGIN RUBYFIGHT_VERIFY_PAGE_CONFIG_KEYS（Minitest がこの範囲だけ読む）
        // Ruby GameConfig::VERIFY_PAGE_CONFIG_KEYS と同一に保つ
        var keys = [
          'WIDTH',
          'HEIGHT',
          'TILE_SIZE',
          'GRID_COLS',
          'GRID_ROWS',
          'GAME_TIME',
          'RUSH_TIME',
          'PREPLAY_COUNTDOWN_SEC',
          'PLAYER_SIZE',
          'BASE_SPEED',
          'SPEED_UP_MULTIPLIER',
          'CPU_SPEED_MULTIPLIER',
          'PLAYER_VIS_SMOOTH',
          'TITLE_BACKGROUND_URL',
          'TITLE_SCREEN_BACKGROUND_URL',
          'PLAY_SCREEN_BACKGROUND_URL',
          'LOGO_KEY_MAX_RGB',
          'LOGO_KEY_BY_MAX_CHANNEL'
        ];
        // END RUBYFIGHT_VERIFY_PAGE_CONFIG_KEYS
        for (var i = 0; i < keys.length; i++) {
          var k = keys[i];
          if (CONFIG[k] !== rb[k]) {
            console.error('[RUBYFIGHT] Ruby/JS config mismatch', k, CONFIG[k], rb[k]);
            return;
          }
        }
        var layoutCmp = { FIELD_WIDTH: FIELD_WIDTH, FIELD_HEIGHT: FIELD_HEIGHT, OFFSET_X: OFFSET_X, OFFSET_Y: OFFSET_Y };
        for (var lk in layoutCmp) {
          if (layoutCmp[lk] !== rb[lk]) {
            console.error('[RUBYFIGHT] Ruby/JS layout mismatch', lk, layoutCmp[lk], rb[lk]);
            return;
          }
        }
        var fm = safeParseJsonMaybeOpal(window.RUBYFIGHT_FIELD_MASK_JSON);
        if (!Array.isArray(fm) || fm.length !== FIELD_MASK.length) {
          console.error('[RUBYFIGHT] FIELD_MASK length mismatch', fm && fm.length, FIELD_MASK.length);
          return;
        }
        for (var r = 0; r < fm.length; r++) {
          if (fm[r] !== FIELD_MASK[r]) {
            console.error('[RUBYFIGHT] FIELD_MASK row mismatch', r);
            return;
          }
        }
        if (window.RUBYFIGHT_UI_LAYOUT_JSON != null) {
          var ru = safeParseJsonMaybeOpal(window.RUBYFIGHT_UI_LAYOUT_JSON);
          if (!ru || !ru.title || ru.title.logoCenterX !== UI_LAYOUT.title.logoCenterX) {
            console.error('[RUBYFIGHT] UI_LAYOUT mismatch', ru && ru.title, UI_LAYOUT && UI_LAYOUT.title);
            return;
          }
        }
        console.log('[RUBYFIGHT] Ruby core ↔ page boot OK (CONFIG + mask' +
          (window.RUBYFIGHT_UI_LAYOUT_JSON != null ? ' + UI_LAYOUT)' : ')'));
      } catch (e) {
        console.warn('[RUBYFIGHT] verify failed', e);
      }
    })();

    document.fonts.ready.then(() => {
      initAssets(() => {
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
      });
    });

  </script>
</body>
</html>
